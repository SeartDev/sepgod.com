<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector .v2 con Gemini AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Analizador de Archivos .v2</h2>
        
        <div class="form-group">
            <label for="apiKey">API Key de Gemini:</label>
            <input type="text" id="apiKey" placeholder="Ingresa tu clave de API (AIzaSy...)" required>
        </div>

        <div class="form-group">
            <label for="fileInput">Selecciona tu archivo (.v2):</label>
            <input type="file" id="fileInput" accept=".v2" required>
        </div>

        <button id="analyzeBtn">Interpretar con AI</button>

        <div id="responseArea" class="response-area"></div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
