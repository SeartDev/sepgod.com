
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon 1.0</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        /* --- VARIABLES DE COLOR (MODO LUZ Y OSCURO) --- */
      /* --- VARIABLES DE COLOR (MODO LUZ Y OSCURO) --- */
        :root {
            --bg-body: #f8fafc;
            --bg-pattern: #cbd5e1;
            --text-main: #475569;
            --text-heading: #1e293b;
            --bg-container: rgba(255, 255, 255, 0.95);
            --border-main: #e2e8f0;
            --bg-input: #f1f5f9;
            --text-input: #334155;
            --bg-box: #ffffff;
            --bg-step: #f8fafc;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --tag-bg: #f1f5f9;
            --tag-hover: #e0f2fe;
            /* Nuevas variables para los nexos múltiples */
            --tag-multi-bg: #faf5ff;
            --tag-multi-border: #d8b4fe;
            --tag-multi-text: #6b21a8;
        }

        body.dark-mode {
            --bg-body: #0f172a; 
            --bg-pattern: #1e293b;
            --text-main: #94a3b8;
            --text-heading: #f8fafc;
            --bg-container: rgba(30, 41, 59, 0.95);
            --border-main: #334155;
            --bg-input: #1e293b;
            --text-input: #f8fafc;
            --bg-box: #0f172a;
            --bg-step: #1e293b;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --tag-bg: #334155;
            --tag-hover: #0284c7;
            /* Nuevas variables para los nexos múltiples en Oscuro */
            --tag-multi-bg: #3b0764;
            --tag-multi-border: #6b21a8;
            --tag-multi-text: #e9d5ff;
        }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 60px 20px 40px 20px; /* Padding top extra para no tapar el botón */
            box-sizing: border-box;
            transition: background-color 0.4s, color 0.4s;
        }

        /* --- ESTILO DEL BOTÓN GENGAR/PONYTA --- */
        .btn-tema {
            position: fixed; top: 20px; right: 20px;
            background: var(--bg-container); border: 1px solid var(--border-main);
            border-radius: 30px; padding: 6px 16px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; color: var(--text-heading); font-weight: 700; font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 6px var(--shadow-color); transition: all 0.3s ease; z-index: 1000;
        }
        .btn-tema img { height: 35px; width: auto; }
        .btn-tema:hover { transform: translateY(-2px); box-shadow: 0 6px 12px var(--shadow-color); }

        /* --- RESTO DE LOS ESTILOS ADAPTADOS --- */
        .contenedor {
            background-color: var(--bg-container); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; border: 1px solid var(--border-main);
            box-shadow: 0 20px 40px var(--shadow-color); text-align: center; max-width: 550px; width: 100%;
            transition: background-color 0.4s, border-color 0.4s;
        }

        h2 { margin-top: 0; color: var(--text-heading); font-weight: 700; letter-spacing: -0.5px; }

        .fila-input { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }

        .slot-foto {
            width: 60px; height: 60px; background: var(--bg-input); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); overflow: hidden;
            transition: background-color 0.4s, border-color 0.4s;
        }
        .slot-foto img { max-width: 90%; max-height: 90%; object-fit: contain; }

        input, select {
            padding: 12px 16px; background-color: var(--bg-input); border: 1px solid transparent;
            border-radius: 12px; font-size: 15px; color: var(--text-input); outline: none; flex-grow: 1;
            transition: background-color 0.4s, color 0.4s;
        }
        input { width: 40%; } select { width: 30%; cursor: pointer; }
        input:focus, select:focus { border-color: #ef4444; background-color: var(--bg-box);}
        select:disabled { opacity: 0.6; cursor: not-allowed; }

        button {
            width: 100%; padding: 14px 20px; background-color: #ef4444; color: white; border: none;
            border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }
        button:hover { background-color: #dc2626; transform: translateY(-2px); }

        #resultado { margin-top: 30px; font-size: 15px; line-height: 1.6; text-align: left; }
        hr { border: 0; height: 1px; background: var(--border-main); margin: 20px 0; }

        .formula-box { background: var(--bg-box); border: 1px solid var(--border-main); border-radius: 16px; padding: 20px; margin: 24px 0; transition: background-color 0.4s; }
        .formula-titulo { font-weight: 700; color: var(--text-heading); margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px; }
        
        .paso-fila {
            display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
            padding: 10px; background: var(--bg-step); border-radius: 12px; border-left: 4px solid var(--border-main);
            transition: background-color 0.4s;
        }
        .paso-1 { border-left-color: #94a3b8; } .paso-2 { border-left-color: #c084fc; } .paso-3 { border-left-color: #fbbf24; }

        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 0.9em; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .badge img { height: 25px; width: auto; object-fit: contain; margin-left: -4px; }

        .badge-macho { background: #e0f2fe; color: #0284c7; }
        .badge-hembra { background: #fce7f3; color: #db2777; }
        .badge-nexo { background: #f3e8ff; color: #9333ea; border: 1px dashed #d8b4fe; }
        .badge-meta { background: #fef3c7; color: #d97706; }
        
        .operador { color: #94a3b8; font-weight: 900; font-size: 0.9em; }
        .nota-sutil { font-size: 0.85em; color: var(--text-main); margin: 5px 0 0 10px; font-style: italic; }

        .gen-box { background: var(--bg-box); border: 1px solid var(--border-main); border-radius: 12px; padding: 16px; margin-top: 12px; transition: background-color 0.4s;}
        .gen-titulo { margin: 0 0 8px 0; color: var(--text-main); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        
        .nexo-tag {
            display: inline-block; background: var(--tag-bg); color: var(--text-input); padding: 6px 14px;
            border-radius: 8px; margin: 4px; font-size: 0.95em; font-weight: 600; cursor: pointer; border: 1px solid var(--border-main);
            transition: all 0.2s;
        }
        .nexo-tag:hover { background: var(--tag-hover); color: var(--text-heading); transform: translateY(-2px); border-color: transparent;}
        /* Agrega esto justo debajo de .nexo-tag:hover {...} */
        .nexo-tag-multi {
            background: var(--tag-multi-bg);
            border-color: var(--tag-multi-border);
            color: var(--tag-multi-text);
        }
        .nexo-tag-multi:hover {
            background: var(--tag-multi-border);
            color: #ffffff;
        }

        .btn-menu {
            background-color: var(--bg-box); color: var(--text-heading); border: 2px solid var(--border-main); padding: 20px;
            font-size: 1em; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; border-radius: 12px; width: 100%; font-family: 'Nunito', sans-serif;
            transition: all 0.3s;
        }
        .btn-ivs:hover { border-color: #3b82f6; background-color: var(--bg-step);}
        .btn-movimientos:hover { border-color: #f59e0b; background-color: var(--bg-step);}
        
        .btn-volver { width: auto; padding: 8px 16px; background-color: var(--bg-input); color: var(--text-input); margin: 0; font-size: 0.85em; box-shadow: none;}
        .btn-volver:hover { background-color: var(--border-main); color: var(--text-heading); transform: none;}

        .animar-entrada { animation: aparecerSuave 0.4s ease-out forwards; }
        @keyframes aparecerSuave { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Alertas transparentes para que luzcan bien en cualquier fondo */
        .alerta { padding: 16px; border-radius: 12px; margin-top: 16px; font-size: 0.95em; color: var(--text-heading);}
        .alerta-roja { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .alerta-naranja { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); }
        .alerta-verde { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        
    </style>
</head>
<body>
    <button id="btnTema" class="btn-tema" onclick="alternarTema()">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/94.gif" alt="Gengar">
        Modo Oscuro
    </button>

<div class="contenedor">
        
        <div id="menuSeleccion">
            <h2>  🧬 Genética Pokémon</h2>
            <p style="color: #64748b; margin-bottom: 24px;">2.0 Selecciona la herramienta que necesitas hoy:</p>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="btn-menu btn-ivs" onclick="abrirHerramienta('ivs')">
                    <span style="font-size: 2em;">💯</span>
                    Heredar IVs (Estadísticas)
                </button>
                
                <button class="btn-menu btn-movimientos" onclick="abrirHerramienta('movimientos')">
                    <span style="font-size: 2em;">⚔️</span>
                    Heredar Movimientos Huevo
                </button>
            </div>
        </div>

        <div id="herramientaIVs" style="display: none;">
            
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenu()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.3em;">💯 Heredar IVs</h2>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput1">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput1" list="listaPokemon" placeholder="Donante origen (Ej. tauros)" onchange="verificarGenero('pokeInput1', 'genero1', 'fotoInput1')">
                <select id="genero1">
                    <option value="macho">Macho ♂</option>
                    <option value="hembra">Hembra ♀</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput2" list="listaPokemon" placeholder="Receptor final (Ej. chansey)" onchange="verificarGenero('pokeInput2', 'genero2', 'fotoInput2')">
                <select id="genero2">
                    <option value="hembra">Hembra ♀</option>
                    <option value="macho">Macho ♂</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <datalist id="listaPokemon"></datalist>
            <button onclick="buscarGrupoHuevo()">Calcular Ruta de Crianza</button>
            <div id="resultado"></div>
        </div>
    <div id="menuGeneraciones" style="display: none;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenuPrincipal()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.3em;">⚔️ Elige la Generación</h2>
            </div>
            
            <p style="color: #64748b; margin-bottom: 24px;">Las reglas de crianza cambian según el juego. Elige tu versión:</p>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="btn-menu" style="border-color: #ec4899;" onclick="abrirHerramientaMovimientos('gen6')">
                    <span style="font-size: 1.5em;">🔵🔴</span>
                    Gen 6 (X-Y / Rubí Omega - Zafiro Alfa)
                </button>
                
                <button class="btn-menu" style="opacity: 0.5; cursor: not-allowed;">
                    <span style="font-size: 1.5em;">☀️🌙</span>
                    Gen 7 (Sol-Luna) - Próximamente
                </button>
                <button class="btn-menu" style="opacity: 0.5; cursor: not-allowed;">
                    <span style="font-size: 1.5em;">⚔️🛡️</span>
                    Gen 8 (Espada-Escudo) - Próximamente
                </button>
            </div>
        </div>

        <div id="herramientaMovimientos" style="display: none;">
            
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenuGeneraciones()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.2em;">⚔️ Movimientos (Gen 6)</h2>
            </div>
            
            <div class="fila-input" style="align-items: flex-start;">
                <div class="slot-foto" id="fotoInput1Mov" style="margin-top: 5px;">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                
                <div style="display: flex; flex-direction: column; width: 100%; gap: 10px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="pokeInput1Mov" list="listaPokemon" placeholder="Donante origen (Ej. charizard)" style="width: 60%; margin-bottom: 0;" onchange="cargarMovimientosGen6()">
                        <select id="genero1Mov" style="width: 40%;">
                            <option value="macho">Macho ♂</option>
                            <option value="hembra">Hembra ♀</option>
                            <option value="sin_genero" hidden>Sin Género ❌</option>
                        </select>
                    </div>
                    
                    <select id="movimientoElegido" disabled style="width: 100%; font-weight: bold; color: #0284c7; background-color: #e0f2fe; border: 1px solid #bae6fd;">
                        <option value="">Esperando Pokémon donante...</option>
                    </select>
                </div>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput2Mov">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput2Mov" list="listaPokemon" placeholder="Receptor final (Ej. bagon)" onchange="verificarGenero('pokeInput2Mov', 'genero2Mov', 'fotoInput2Mov')">
                <select id="genero2Mov">
                    <option value="hembra">Hembra ♀</option>
                    <option value="macho">Macho ♂</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <button onclick="calcularRutaMovimientos()">Trazar Ruta de Movimientos</button>
            <div id="resultadoMovimientos"></div>
        </div>
    </div>
    <script>
        // --- MODO OSCURO (GENGAR / PONYTA) ---
        let esModoOscuro = false;
        function alternarTema() {
            esModoOscuro = !esModoOscuro;
            document.body.classList.toggle('dark-mode', esModoOscuro);
            
            const btnTema = document.getElementById('btnTema');
            if (esModoOscuro) {
                // Al estar oscuro, mostramos a Ponyta invitando a volver al Modo Luz
                btnTema.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/77.gif" alt="Ponyta">
                    Modo Luz
                `;
            } else {
                // Al estar en luz, mostramos a Gengar invitando al Modo Oscuro
                btnTema.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/94.gif" alt="Gengar">
                    Modo Oscuro
                `;
            }
        }
      // --- NAVEGACIÓN Y UTILIDADES ---
        function abrirHerramienta(tipo) {
            document.getElementById('menuSeleccion').style.display = 'none';
            if (tipo === 'ivs') {
                document.getElementById('herramientaIVs').style.display = 'block';
            } else if (tipo === 'movimientos') {
                document.getElementById('menuGeneraciones').style.display = 'block';
            }
        }

        function volverMenuPrincipal() {
            document.getElementById('herramientaIVs').style.display = 'none';
            document.getElementById('menuGeneraciones').style.display = 'none';
            document.getElementById('herramientaMovimientos').style.display = 'none';
            document.getElementById('menuSeleccion').style.display = 'block';
            document.getElementById('resultado').innerHTML = ''; // Limpia resultados previos
        }

        function volverMenuGeneraciones() {
            document.getElementById('herramientaMovimientos').style.display = 'none';
            document.getElementById('menuGeneraciones').style.display = 'block';
            document.getElementById('resultadoMovimientos').innerHTML = '';
        }

        function abrirHerramientaMovimientos(gen) {
            if (gen === 'gen6') {
                document.getElementById('menuGeneraciones').style.display = 'none';
                document.getElementById('herramientaMovimientos').style.display = 'block';
            }
        }

        // --- NUEVA FUNCIÓN MÁGICA: Extrae GIF animado o foto estática oficial ---
        function extraerMejorSprite(dataPokemon) {
            // 1. Intentar obtener el GIF animado (Generaciones 1-5)
            // Ruta: sprites -> versions -> generation-v -> black-white -> animated -> front_default
            const gifUrl = dataPokemon.sprites?.versions?.["generation-v"]?.["black-white"]?.animated?.front_default;
            
            if (gifUrl) {
                return gifUrl; // Encontramos GIF!
            }
            
            // 2. Fallback: Si no hay GIF (Gen 6+), usar la imagen oficial estática de alta calidad
            return dataPokemon.sprites?.other?.["official-artwork"]?.front_default || '';
        }

        // Cargar autocompletado nativo al iniciar
        window.onload = async function() {
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=10000');
                const data = await res.json();
                const datalist = document.getElementById('listaPokemon');
                data.results.forEach(poke => {
                    const opcion = document.createElement('option');
                    opcion.value = poke.name;
                    datalist.appendChild(opcion);
                });
            } catch (e) {}
        };

        // Bloquear géneros imposibles y CARGAR FOTO al escribir
        async function verificarGenero(inputId, selectId, fotoContId) {
            const nombre = document.getElementById(inputId).value.toLowerCase().trim();
            const selectElement = document.getElementById(selectId);
            const fotoContainer = document.getElementById(fotoContId);
            const silueta = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png";

            if (!nombre) {
                selectElement.disabled = false;
                if (selectElement.value === 'sin_genero') selectElement.value = 'macho';
                fotoContainer.innerHTML = `<img src="${silueta}" alt="esperando">`;
                return;
            }
            try {
                // Pedimos info de especie y pokemon en paralelo para ser rápidos
                const [resEspecie, resPoke] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`)
                ]);

                if (!resEspecie.ok || !resPoke.ok) {
                    fotoContainer.innerHTML = `<img src="${silueta}" alt="error">`;
                    return; 
                }

                const dataEspecie = await resEspecie.json();
                const dataPoke = await resPoke.json();

                // 1. Cargar la foto/GIF en el slot
                const urlFoto = extraerMejorSprite(dataPoke);
                fotoContainer.innerHTML = `<img src="${urlFoto}" alt="${nombre}" class="animar-entrada">`;

                // 2. Lógica de bloqueo de género
                const rate = dataEspecie.gender_rate;
                if (rate === -1) { selectElement.value = 'sin_genero'; selectElement.disabled = true; } 
                else if (rate === 0) { selectElement.value = 'macho'; selectElement.disabled = true; } 
                else if (rate === 8) { selectElement.value = 'hembra'; selectElement.disabled = true; } 
                else { 
                    selectElement.disabled = false; 
                    if (selectElement.value === 'sin_genero') selectElement.value = 'macho'; 
                }
            } catch (error) {
                fotoContainer.innerHTML = `<img src="${silueta}" alt="error">`;
            }
        }

        // --- GENERADORES DE FÓRMULAS VISUALES (Ahora aceptan URLs de fotos) ---
        function mostrarFormula(n1, g1, f1, n2, g2, f2, nexoN, nexoF) {
            let pasosHtml = "";
            let donanteBadg = `<div class="badge badge-macho"><img src="${f1}">${n1} ♂</div>`;

            if (g1 === 'hembra') {
                pasosHtml += `
                    <div class="paso-fila paso-1">
                        <div class="badge badge-hembra"><img src="${f1}">${n1} ♀</div><span class="operador">➕</span><div class="badge badge-macho">Cualquier ♂</div><span class="operador">➔</span><div class="badge badge-macho"><img src="${f1}">Cría ${n1} ♂</div>
                    </div>`;
                donanteBadg = `<div class="badge badge-macho"><img src="${f1}">Cría ${n1} ♂</div>`;
            }

            pasosHtml += `
                <div class="paso-fila paso-2">
                    ${donanteBadg}<span class="operador">➕</span><div class="badge badge-nexo"><img src="${nexoF}">${nexoN} ♀</div><span class="operador">➔</span><div class="badge badge-macho"><img src="${nexoF}">Cría ${nexoN} ♂</div>
                </div>`;

            let finalGenSigno = g2 === 'macho' ? '♂' : '♀';
            pasosHtml += `
                <div class="paso-fila paso-3">
                    <div class="badge badge-macho"><img src="${nexoF}">Cría ${nexoN} ♂</div><span class="operador">➕</span><div class="badge badge-hembra"><img src="${f2}">Madre ${n2} ♀</div><span class="operador">➔</span><div class="badge badge-meta"><img src="${f2}">Cría ${n2} ${finalGenSigno} ✨</div>
                </div>`;

            dibujarEsquema(`📍 Ruta Directa con ${nexoN}`, pasosHtml);
        }

        function mostrarFormulaMultiple(n1, g1, f1, n2, g2, f2, nx1N, nx1F, nx2N, nx2F) {
            let pasosHtml = "";
            let donanteBadg = `<div class="badge badge-macho"><img src="${f1}">${n1} ♂</div>`;

        function dibujarEsquema(titulo, pasosHtml) {

                <div class="formula-box animar-entrada">

        // 4. LÓGICA DE GRAFOS (Actualizada para cachear URLs de fotos)
        let especiesPorGrupo = null;
        let gruposDeEspecie = null;
        const cacheFotosNexos = {}; // Guardar URLs de fotos para no re-pedirlas al clicar

        async function cargarGruposGlobales() {
            if (especiesPorGrupo) return;
            especiesPorGrupo = {}; gruposDeEspecie = {};
            const gruposComunes = ["monster", "water1", "bug", "flying", "ground", "fairy", "plant", "humanshape", "water3", "mineral", "indeterminate", "water2", "dragon"];
            const promesas = gruposComunes.map(g => fetch(`https://pokeapi.co/api/v2/egg-group/${g}`).then(r => r.json()));
            const resultados = await Promise.all(promesas);
            
            resultados.forEach(data => {
                especiesPorGrupo[data.name] = data.pokemon_species.map(p => p.name);
                data.pokemon_species.forEach(p => {
                    if (!gruposDeEspecie[p.name]) gruposDeEspecie[p.name] = [];
                    gruposDeEspecie[p.name].push(data.name);
                });
            });
        }

        async function buscarGrupoHuevo() {
            const p1 = document.getElementById('pokeInput1').value.toLowerCase().trim();
            const g1 = document.getElementById('genero1').value;
            const p2 = document.getElementById('pokeInput2').value.toLowerCase().trim();
            const g2 = document.getElementById('genero2').value;
            const divRes = document.getElementById('resultado');

            if (!p1 || !p2) { divRes.innerHTML = `<div class="alerta alerta-roja">Escribe ambos Pokémon.</div>`; return; }

            try {
                await cargarGruposGlobales();
                
                // Pedimos /species y /pokemon de ambos iniciales para tener fotos y datos biológicos
                const [spec1, spec2, poke1Data, poke2Data] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${p1}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${p2}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${p1}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${p2}`).then(r => r.json())
                ]);

                // Guardar URLs de fotos de los iniciales
                const foto1 = extraerMejorSprite(poke1Data);
                const foto2 = extraerMejorSprite(poke2Data);

                const grp1 = spec1.egg_groups.map(g => g.name);
                const grp2 = spec2.egg_groups.map(g => g.name);
                const n1C = p1.charAt(0).toUpperCase() + p1.slice(1);
                const n2C = p2.charAt(0).toUpperCase() + p2.slice(1);

                let htmlInfo = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <div><strong>${n1C}</strong> ${g1 === 'macho' ? '♂' : '♀'}</div>
                        <div style="color:#64748b; font-size:0.9em;">[${grp1.join(', ')}]</div>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <div><strong>${n2C}</strong> ${g2 === 'macho' ? '♂' : '♀'}</div>
                        <div style="color:#64748b; font-size:0.9em;">[${grp2.join(', ')}]</div>
                    </div><hr>`;

                if (spec1.gender_rate === -1 || spec2.gender_rate === -1) { divRes.innerHTML = htmlInfo + `<div class="alerta alerta-roja">⛔ Sin género.</div>`; return; }
                if (spec1.gender_rate === 8) { divRes.innerHTML = htmlInfo + `<div class="alerta alerta-naranja">⛔ <strong>${n1C}</strong> es sumidero Hembra.</div>`; return; }
                if (spec2.gender_rate === 0) { divRes.innerHTML = htmlInfo + `<div class="alerta alerta-naranja">⛔ <strong>${n2C}</strong> es donante Macho.</div>`; return; }
                if (grp1.includes('no-eggs') || grp2.includes('no-eggs')) { divRes.innerHTML = htmlInfo + `<div class="alerta alerta-roja">No pueden criar.</div>`; return; }
                if (grp1.some(g => grp2.includes(g))) { divRes.innerHTML = htmlInfo + `<div class="alerta alerta-verde"><strong>¡Compatibles Directos!</strong></div>`; return; }

                // FASE 1: Nexos Sencillos
                let sencillosBasicos = [];
                for (let g of grp1) {
                    if (!especiesPorGrupo[g]) continue;
                    especiesPorGrupo[g].forEach(n => {
                        if (n !== p1 && n !== p2 && n !== 'ditto' && gruposDeEspecie[n] && gruposDeEspecie[n].some(gx => grp2.includes(gx))) {
                            sencillosBasicos.push(n);
                        }
                    });
                }
                sencillosBasicos = [...new Set(sencillosBasicos)];
                
                // Pedimos info y FOTOS de los nexos sencillos en paralelo
                const promesasSencillos = sencillosBasicos.map(nombre => Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`).then(r => r.json()) // Foto aquí
                ]));
                const datosSencillosPairs = await Promise.all(promesasSencillos);

                let sencillosValidos = [];
                datosSencillosPairs.forEach(([dataSpec, dataPoke]) => {
                    if (dataSpec.gender_rate >= 1 && dataSpec.gender_rate <= 7) {
                        const urlF = extraerMejorSprite(dataPoke);
                        cacheFotosNexos[dataSpec.name] = urlF; // Guardar foto en cache
                        sencillosValidos.push({ nombre: dataSpec.name, id: dataSpec.id, foto: urlF });
                    }
                });

                // FASE 2: Nexos Múltiples (Lógica simplificada para velocidad, pero incluye fotos)
                let multiplesValidos = [];
                let combinacionesVistas = new Set();
                
                // Para múltiples, solo guardamos nombres, pediremos fotos solo si clican
                // (Para no saturar la API con 10 peticiones extra ahora mismo)
                for (let g1 of grp1) {
                    for (let g2 of grp2) {
                        if (multiplesValidos.length >= 5) break;
                        if (!especiesPorGrupo[g1] || !especiesPorGrupo[g2]) continue;
                        
                        for (let nx1N of especiesPorGrupo[g1]) {
                            if (multiplesValidos.length >= 5) break;
                            if (nx1N === p1 || nx1N === p2 || nx1N === 'ditto' || sencillosBasicos.includes(nx1N)) continue;
                            
                            for (let nx2N of especiesPorGrupo[g2]) {
                                if (multiplesValidos.length >= 5) break;
                                if (nx2N === p1 || nx2N === p2 || nx2N === 'ditto' || nx1N === nx2N || sencillosBasicos.includes(nx2N)) continue;
                                
                                if (gruposDeEspecie[nx1N].some(gx => gruposDeEspecie[nx2N].includes(gx))) {
                                    let hash = nx1N + "|" + nx2N;
                                    if (!combinacionesVistas.has(hash)) {
                                        combinacionesVistas.add(hash);
                                        // Guardamos nombres capitalizados listos para mostrar
                                        let Cnx1 = nx1N.charAt(0).toUpperCase() + nx1N.slice(1);
                                        let Cnx2 = nx2N.charAt(0).toUpperCase() + nx2N.slice(1);
                                        multiplesValidos.push([Cnx1, Cnx2]);
                                    }
                                }
                            }
                        }
                    }
                }

                if (sencillosValidos.length === 0 && multiplesValidos.length === 0) {
                     divRes.innerHTML = htmlInfo + `<div class="alerta alerta-roja">Imposible conectar biológicamente.</div>`; return;
                }

                // --- CONSTRUCCIÓN DE LA INTERFAZ ---
                let espacioFormula = `<div id="contenedorFormula"><div style="background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; color: #64748b; margin: 20px 0;">👆 <em>Clic en un puente para ver la ruta con fotos.</em></div></div>`;
                let htmlListas = "";

                if (sencillosValidos.length > 0) {
                    htmlListas += `<div style="font-weight:700; color:#15803d; margin-top:10px;">🟢 Nexos Sencillos (1 Salto):</div>`;
                    
                    const obtenerReg = (id) => {
                        if (id <= 151) return "Kanto"; if (id <= 251) return "Johto"; if (id <= 386) return "Hoenn";
                        if (id <= 493) return "Sinnoh"; if (id <= 649) return "Teselia"; if (id <= 721) return "Kalos";
                        if (id <= 809) return "Alola"; if (id <= 905) return "Galar"; return "Paldea";
                    };

                    const nexosAgrupados = {};
                    sencillosValidos.forEach(nx => {
                        const reg = obtenerReg(nx.id);
                        if (!nexosAgrupados[reg]) nexosAgrupados[reg] = []; 
                        nexosAgrupados[reg].push({n: nx.nombre.charAt(0).toUpperCase() + nx.nombre.slice(1), f: nx.foto});
                    });

                    ["Kanto", "Johto", "Hoenn", "Sinnoh", "Teselia", "Kalos", "Alola", "Galar", "Paldea"].forEach(reg => {
                        if (nexosAgrupados[reg]) {
                            nexosAgrupados[reg].sort((a,b) => a.n.localeCompare(b.n)); 
                            let botones = nexosAgrupados[reg].map(nx => {
                                // Al clicar, pasamos las URLs de las fotos que ya tenemos capturadas
                                return `<span class="nexo-tag" onclick="mostrarFormula('${n1C}', '${g1}', '${foto1}', '${n2C}', '${g2}', '${foto2}', '${nx.n}', '${nx.f}')">${nx.n}</span>`;
                            }).join(' ');
                            htmlListas += `<div class="gen-box"><div class="gen-titulo">${reg}</div><div>${botones}</div></div>`;
                        }
                    });
                }

                if (multiplesValidos.length > 0) {
                    htmlListas += `<div style="font-weight:700; color:#9333ea; margin-top:20px;">🟣 Cadenas Múltiples (2 Saltos - Máx 5):</div><div class="gen-box">`;
                    
                    // Usamos Promise.all para cargar las fotos de los múltiplos ANTES de dibujar los botones,
                    // así el onclick ya lleva las URLs preparadas.
                    const promesasFotosMultiples = multiplesValidos.map(async (par) => {
                        const n1Nom = par[0].toLowerCase();
                        const n2Nom = par[1].toLowerCase();
                        const [dPoke1, dPoke2] = await Promise.all([
                            fetch(`https://pokeapi.co/api/v2/pokemon/${n1Nom}`).then(r => r.json()),
                            fetch(`https://pokeapi.co/api/v2/pokemon/${n2Nom}`).then(r => r.json())
                        ]);
                        return [extraerMejorSprite(dPoke1), extraerMejorSprite(dPoke2)];
                    });
                    
                    const urlsFotosMultiples = await Promise.all(promesasFotosMultiples);

                    multiplesValidos.forEach((par, index) => {
                        const fotoNx1 = urlsFotosMultiples[index][0];
                        const fotoNx2 = urlsFotosMultiples[index][1];
                        htmlListas += `<span class="nexo-tag nexo-tag-multi" onclick="mostrarFormulaMultiple('${n1C}', '${g1}', '${foto1}', '${n2C}', '${g2}', '${foto2}', '${par[0]}', '${fotoNx1}', '${par[1]}', '${fotoNx2}')">${par[0]} ➔ ${par[1]}</span>`;
                    });
                    htmlListas += `</div>`;
                }

                divRes.innerHTML = htmlInfo + espacioFormula + htmlListas;

            } catch (error) {
                divRes.innerHTML = `<div class="alerta alerta-roja">Error técnico o de conexión. ${error.message}</div>`;
            }
        }

        // --- LÓGICA DE HERRAMIENTA MOVIMIENTOS (GEN 6) ---

        async function cargarMovimientosGen6() {
            // 1. Ejecutar la función visual que ya tenemos para la foto y el género
            await verificarGenero('pokeInput1Mov', 'genero1Mov', 'fotoInput1Mov');

            const nombrePoke = document.getElementById('pokeInput1Mov').value.toLowerCase().trim();
            const selectMov = document.getElementById('movimientoElegido');

            if (!nombrePoke) {
                selectMov.innerHTML = '<option value="">Esperando Pokémon donante...</option>';
                selectMov.disabled = true;
                return;
            }

            selectMov.innerHTML = '<option value="">Descargando datos genéticos (Gen 6)...</option>';
            selectMov.disabled = true;

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombrePoke}`);
                if (!res.ok) throw new Error("Pokémon no encontrado");
                const data = await res.json();

                // Arreglos para separar los movimientos por categoría
                let movsNivel = [];
                let movsMT = [];
                let movsHuevo = [];
                let movsTutor = []; 

                // 2. Extraer y filtrar movimientos estrictamente para Gen 6
                data.moves.forEach(moveData => {
                    const detallesGen6 = moveData.version_group_details.filter(details => 
                        details.version_group.name === 'x-y' || 
                        details.version_group.name === 'omega-ruby-alpha-sapphire'
                    );

                    if (detallesGen6.length > 0) {
                        // Buscamos si lo aprende por nivel y a qué nivel
                        let nivel = 0;
                        const metodos = detallesGen6.map(d => {
                            if (d.move_learn_method.name === 'level-up' && d.level_learned_at > 0) {
                                nivel = d.level_learned_at;
                            }
                            return d.move_learn_method.name;
                        });

                        let nombreLimpio = moveData.move.name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        
                        // Si es por nivel, le agregamos el texto (Nv. X)
                        if (nivel > 0) {
                            nombreLimpio += ` (Nv. ${nivel})`;
                        }

                        const objMov = { val: moveData.move.name, text: nombreLimpio };

                        // 3. Clasificamos con jerarquía
                        if (metodos.includes('level-up')) {
                            movsNivel.push(objMov);
                        } else if (metodos.includes('machine')) {
                            movsMT.push(objMov);
                        } else if (metodos.includes('egg')) {
                            movsHuevo.push(objMov);
                        } else {
                            movsTutor.push(objMov);
                        }
                    }
                });

                        // 3. Clasificamos con jerarquía (Nivel > MT > Huevo > Tutor)
                        if (metodos.includes('level-up')) {
                            movsNivel.push(objMov);
                        } else if (metodos.includes('machine')) {
                            movsMT.push(objMov);
                        } else if (metodos.includes('egg')) {
                            movsHuevo.push(objMov);
                        } else {
                            movsTutor.push(objMov);
                        }
                    }
                });

                if (movsNivel.length === 0 && movsMT.length === 0 && movsHuevo.length === 0 && movsTutor.length === 0) {
                    selectMov.innerHTML = '<option value="">No hay datos de movimientos para Gen 6</option>';
                    return;
                }

                // 4. Ordenar alfabéticamente cada grupo por separado
                const ordenar = (arr) => arr.sort((a, b) => a.text.localeCompare(b.text));
                ordenar(movsNivel); 
                ordenar(movsMT); 
                ordenar(movsHuevo); 
                ordenar(movsTutor);

                // 5. Construir el HTML con Grupos Optativos (<optgroup>) y colores
                let opcionesHtml = '<option value="">-- Elige el movimiento a heredar --</option>';

                if (movsNivel.length > 0) {
                    opcionesHtml += `<optgroup label="🟢 Por Nivel (Level-Up)" style="color: #15803d; background: #f0fdf4;">`;
                    movsNivel.forEach(m => opcionesHtml += `<option value="${m.val}" style="color: #334155; background: #fff;">${m.text}</option>`);
                    opcionesHtml += `</optgroup>`;
                }
                
                if (movsMT.length > 0) {
                    opcionesHtml += `<optgroup label="🟡 Por MT / MO (Machine)" style="color: #b45309; background: #fffbeb;">`;
                    movsMT.forEach(m => opcionesHtml += `<option value="${m.val}" style="color: #334155; background: #fff;">${m.text}</option>`);
                    opcionesHtml += `</optgroup>`;
                }
                
                if (movsHuevo.length > 0) {
                    opcionesHtml += `<optgroup label="🟣 Movimiento Huevo (Egg Move)" style="color: #7e22ce; background: #faf5ff;">`;
                    movsHuevo.forEach(m => opcionesHtml += `<option value="${m.val}" style="color: #334155; background: #fff;">${m.text}</option>`);
                    opcionesHtml += `</optgroup>`;
                }
                
                if (movsTutor.length > 0) {
                    opcionesHtml += `<optgroup label="🔵 Tutor / Evento" style="color: #0369a1; background: #f0f9ff;">`;
                    movsTutor.forEach(m => opcionesHtml += `<option value="${m.val}" style="color: #334155; background: #fff;">${m.text}</option>`);
                    opcionesHtml += `</optgroup>`;
                }

                selectMov.innerHTML = opcionesHtml;
                selectMov.disabled = false;

            } catch (error) {
                selectMov.innerHTML = '<option value="">Error al cargar movimientos.</option>';
            }
        }

      // --- CEREBRO MATEMÁTICO: RUTAS DE MOVIMIENTOS HUEVO (GEN 6) ---

                    if (m.move.name === movName) {
                        const enGen6 = m.version_group_details.filter(d => 
                            (d.version_group.name === 'x-y' || d.version_group.name === 'omega-ruby-alpha-sapphire') &&
                            (d.move_learn_method.name === 'egg' || d.move_learn_method.name === 'machine' || d.move_learn_method.name === 'level-up')
                        );
                        if (enGen6.length > 0) destinoPuedeHeredar = true;
                    }
                });

                if (!destinoPuedeHeredar) {
                    divRes.innerHTML = htmlInfo + `<div class="alerta alerta-roja">❌ <strong>Genéticamente Imposible:</strong> ${n2C} no tiene compatibilidad para heredar ${movText} en la Sexta Generación (ni como Mov. Huevo, MT o Nivel).</div>`;
                    return;
                }

                if (grp1.some(g => grp2.includes(g))) { 
                    divRes.innerHTML = htmlInfo + `<div class="alerta alerta-verde"><strong>¡Compatibles Directos!</strong> Comparten grupo huevo. Cruza directamente a un ${n1C} (que sepa el ataque) con una ${n2C} Hembra.</div>`; 
                    return; 
                }

                // 3. EL ATAJO MAESTRO DE LA API (Buscar quién sabe el ataque)
                const moveDataRes = await fetch(`https://pokeapi.co/api/v2/move/${movName}`);
                const moveData = await moveDataRes.json();
                const pokemonsQueSabenAtaque = moveData.learned_by_pokemon.map(p => p.name);

                // 4. CRUCE DE CONJUNTOS (Teoría de Grafos)
                let candidatosBrutos = [];
                for (let g of grp1) {
                    if (!especiesPorGrupo[g]) continue;
                    especiesPorGrupo[g].forEach(n => {
                        // El candidato debe: 1. Saber el ataque. 2. Compartir grupo con Poke1. 3. Compartir grupo con Poke2.
                        if (n !== p1 && n !== p2 && n !== 'ditto' && n !== 'smeargle') {
                            if (pokemonsQueSabenAtaque.includes(n) && gruposDeEspecie[n].some(gx => grp2.includes(gx))) {
                                candidatosBrutos.push(n);
                            }
                        }
                    });
                }
                candidatosBrutos = [...new Set(candidatosBrutos)];

                // 5. VERIFICACIÓN ESTRICTA GEN 6 Y GÉNERO
                const promesasCandidatos = candidatosBrutos.map(nombre => Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`).then(r => r.json())
                ]));
                const datosCandidatosPairs = await Promise.all(promesasCandidatos);

                let nexosValidos = [];
                datosCandidatosPairs.forEach(([dataSpec, dataPoke]) => {
                    // Verificamos género de puente capaz
                    if (dataSpec.gender_rate >= 1 && dataSpec.gender_rate <= 7) {
                        // Verificamos que realmente aprenda el movimiento en Gen 6
                        let loAprendeGen6 = false;
                        dataPoke.moves.forEach(m => {
                            if (m.move.name === movName) {
                                const enGen6 = m.version_group_details.filter(d => 
                                    (d.version_group.name === 'x-y' || d.version_group.name === 'omega-ruby-alpha-sapphire') &&
                                    (d.move_learn_method.name === 'egg' || d.move_learn_method.name === 'machine' || d.move_learn_method.name === 'level-up')
                                );
                                if (enGen6.length > 0) loAprendeGen6 = true;
                            }
                        });

                        if (loAprendeGen6) {
                            const urlF = extraerMejorSprite(dataPoke);
                            cacheFotosNexos[dataSpec.name] = urlF;
                            nexosValidos.push({ nombre: dataSpec.name, id: dataSpec.id, foto: urlF });
                        }
                    }
                });

                if (nexosValidos.length === 0) {
                     let mensaje = htmlInfo + `<div class="alerta alerta-roja">No existe un Nexo de 1 Salto que aprenda el movimiento y conecte ambos grupos en Gen 6.`;
                     // Añadir el "Factor Smeargle" como última esperanza
                     if (grp1.includes('ground') || grp2.includes('ground')) { // 'ground' es el grupo Campo en la API
                         mensaje += `<br><br>💡 <em>Alerta Smeargle:</em> Como uno de los Pokémon pertenece al grupo Campo, podrías usar a Smeargle con 'Esquema' para copiar el ataque y pasarlo.`;
                     }
                     mensaje += `</div>`;
                     divRes.innerHTML = mensaje;
                     return;
                }

                // 6. DIBUJAR INTERFAZ (Igual que IVs, usando mostrarFormula)
                let espacioFormula = `<div id="contenedorFormula"><div style="background: var(--bg-input); padding: 15px; border-radius: 12px; text-align: center; color: var(--text-main); margin: 20px 0;">👆 <em>Clic en un puente para generar la cadena de movimientos.</em></div></div>`;
                let htmlListas = `<div style="font-weight:700; color:#0284c7; margin-top:10px;">🟢 Puentes de Movimiento (Gen 6):</div>`;
                
                const obtenerReg = (id) => {
                    if (id <= 151) return "Kanto"; if (id <= 251) return "Johto"; if (id <= 386) return "Hoenn";
                    if (id <= 493) return "Sinnoh"; if (id <= 649) return "Teselia"; return "Modernos (Kalos+)";
                };

                const nexosAgrupados = {};
                nexosValidos.forEach(nx => {
                    const reg = obtenerReg(nx.id);
                    if (!nexosAgrupados[reg]) nexosAgrupados[reg] = []; 
                    nexosAgrupados[reg].push({n: nx.nombre.charAt(0).toUpperCase() + nx.nombre.slice(1), f: nx.foto});
                });

                ["Kanto", "Johto", "Hoenn", "Sinnoh", "Teselia", "Modernos (Kalos+)"].forEach(reg => {
                    if (nexosAgrupados[reg]) {
                        nexosAgrupados[reg].sort((a,b) => a.n.localeCompare(b.n)); 
                        let botones = nexosAgrupados[reg].map(nx => {
                            // Reutilizamos mostrarFormula de los IVs porque la lógica de cruce de géneros es idéntica
                            return `<span class="nexo-tag" style="border-color:#bae6fd;" onclick="mostrarFormula('${n1C}', '${g1}', '${foto1}', '${n2C}', '${g2}', '${foto2}', '${nx.n}', '${nx.f}')">${nx.n}</span>`;
                        }).join(' ');
                        htmlListas += `<div class="gen-box" style="border-left: 4px solid #38bdf8;"><div class="gen-titulo">${reg}</div><div>${botones}</div></div>`;
                    }
                });

                divRes.innerHTML = htmlInfo + espacioFormula + htmlListas;

            } catch (error) {
                divRes.innerHTML = `<div class="alerta alerta-roja">Error en el cruce genético: ${error.message}</div>`;
            }
        }
    </script>

</body>
</html>
