
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon</title>
    
    <style>
        /* --- ESTILOS CSS SENCILLOS --- */
        
        /* Estilos generales para centrar el contenido y darle una fuente bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor principal que parece una tarjeta */
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para el campo de texto (input) */
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* Estilo para el botón de buscar */
        button {
            padding: 10px 20px;
            background-color: #e3350d; /* Rojo estilo Pokémon */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        /* Efecto al pasar el mouse sobre el botón */
        button:hover {
            background-color: #b32a0a;
        }

        /* Espacio donde aparecerá el resultado o los errores */
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 50px; /* Evita que la tarjeta salte mucho al mostrar texto */
        }
    </style>
</head>
<body>

  <div class="contenedor">
        <h2>Grupos Huevo Pokémon</h2>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="pokeInput1" placeholder="1er Pokémon (Ej. pikachu)" style="width: 60%; margin-bottom: 0;">
            <select id="genero1" style="width: 40%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
                <option value="macho">Macho ♂️</option>
                <option value="hembra">Hembra ♀️</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="pokeInput2" placeholder="Pokémon final (Ej. squirtle)" style="width: 60%; margin-bottom: 0;">
            <select id="genero2" style="width: 40%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
                <option value="hembra">Hembra ♀️</option>
                <option value="macho">Macho ♂️</option>
            </select>
        </div>
        
        <button onclick="buscarGrupoHuevo()">Buscar</button>
        
        <div id="resultado"></div>
    </div>
    <script>
     async function buscarGrupoHuevo() {
            
            const nombrePoke1 = document.getElementById('pokeInput1').value.toLowerCase().trim();
            const genero1 = document.getElementById('genero1').value;
            const nombrePoke2 = document.getElementById('pokeInput2').value.toLowerCase().trim();
            const genero2 = document.getElementById('genero2').value;
            const divResultado = document.getElementById('resultado');

            if (!nombrePoke1 || !nombrePoke2) {
                divResultado.innerHTML = "Por favor, escribe el nombre de ambos Pokémon.";
                return; 
            }

            divResultado.innerHTML = "Calculando árbol genealógico y aislando nodos...";

            try {
                const buscarDatosPoke = async (nombre) => {
                    const respuesta = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`);
                    if (!respuesta.ok) throw new Error(`No se encontró a ${nombre}`);
                    return await respuesta.json();
                };

                const [datosPoke1, datosPoke2] = await Promise.all([
                    buscarDatosPoke(nombrePoke1),
                    buscarDatosPoke(nombrePoke2)
                ]);

                const grupos1 = datosPoke1.egg_groups.map(g => g.name);
                const grupos2 = datosPoke2.egg_groups.map(g => g.name);
                const rate1 = datosPoke1.gender_rate;
                const rate2 = datosPoke2.gender_rate;
                const nombre1Cap = nombrePoke1.charAt(0).toUpperCase() + nombrePoke1.slice(1);
                const nombre2Cap = nombrePoke2.charAt(0).toUpperCase() + nombrePoke2.slice(1);

                let htmlResultado = `
                    <p><strong>${nombre1Cap}</strong> - Grupos: ${grupos1.join(', ')}</p>
                    <p><strong>${nombre2Cap}</strong> - Grupos: ${grupos2.join(', ')}</p>
                    <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
                `;

                // --- REGLAS ESTRICTAS DE CRIANZA (TEORÍA DE GRAFOS) ---

                // 1. Pokémon Sin Género (Nodos Aislados)
                if (rate1 === -1 || rate2 === -1) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:red;"><strong>⛔ Nodos Aislados:</strong> Uno de estos Pokémon no tiene género. Son callejones sin salida genéticos y solo pueden criar con Ditto. No se pueden calcular puentes.</p>`;
                    return;
                }

                // 2. Pokémon 100% Hembra como inicio (Receptor Final / Sumidero)
                if (rate1 === 8) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:#d97706;"><strong>⛔ Receptor Final:</strong> <strong>${nombre1Cap}</strong> es 100% Hembra. Es un sumidero genético, la cría siempre será de su especie. No puede tener "flechas de salida" hacia otra especie.</p>`;
                    return;
                }

                // 3. Pokémon 100% Macho como final (Donante Exclusivo)
                if (rate2 === 0) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:#d97706;"><strong>⛔ Donante Exclusivo:</strong> <strong>${nombre2Cap}</strong> es 100% Macho. Al no existir hembras de su especie, nunca podrá recibir "flechas de entrada" desde otra especie.</p>`;
                    return;
                }

                // Validación de lógica del usuario (Macho -> Nexo -> Hembra)
                if (genero1 === 'hembra' || genero2 === 'macho') {
                    divResultado.innerHTML = htmlResultado + `<p style="color:#d97706;"><strong>⚠️ Error de flujo:</strong> Para hacer una cadena hacia otra especie, el 1er Pokémon debe ser <strong>Macho</strong> (donante) y el Pokémon final debe ser <strong>Hembra</strong> (receptora). Por favor, ajusta los selectores.</p>`;
                    return;
                }

                if (grupos1.includes('no-eggs') || grupos2.includes('no-eggs')) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:red;">Uno de estos Pokémon pertenece al grupo Desconocido (no puede criar).</p>`;
                    return;
                }

                if (grupos1.some(g => grupos2.includes(g))) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:green;">¡Comparten grupo huevo! Pueden criar directamente sin nexos.</p>`;
                    return;
                }

                divResultado.innerHTML = htmlResultado + "<em>Buscando nexos puente...</em>";

                const obtenerEspeciesDeGrupos = async (grupos) => {
                    let especies = new Map(); 
                    for (let grupo of grupos) {
                        if (grupo === 'ditto') continue; 
                        const res = await fetch(`https://pokeapi.co/api/v2/egg-group/${grupo}`);
                        const data = await res.json();
                        data.pokemon_species.forEach(p => especies.set(p.name, p.name));
                    }
                    return especies;
                };

                const [especiesLado1, especiesLado2] = await Promise.all([
                    obtenerEspeciesDeGrupos(grupos1),
                    obtenerEspeciesDeGrupos(grupos2)
                ]);

                let nexosBasicos = [];
                for (let nombre of especiesLado1.keys()) {
                    if (especiesLado2.has(nombre) && nombre !== nombrePoke1 && nombre !== nombrePoke2) {
                        nexosBasicos.push(nombre);
                    }
                }

                const promesasNexos = nexosBasicos.map(nombre => 
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`).then(res => res.json())
                );
                const datosNexos = await Promise.all(promesasNexos);

                let nexosFiltrados = [];

                datosNexos.forEach(data => {
                    const rate = data.gender_rate;
                    
                    // REGLA DEL NEXO: Debe poder funcionar como "Madre" (Paso 1) y "Padre" (Paso 2)
                    // Por lo tanto, rate DEBE estar entre 1 y 7. 
                    // Excluimos 0 (100% Macho), 8 (100% Hembra) y -1 (Sin género).
                    if (rate >= 1 && rate <= 7) {
                        nexosFiltrados.push({ nombre: data.name, id: data.id });
                    }
                });

                if (nexosFiltrados.length === 0) {
                     divResultado.innerHTML = htmlResultado + `<p style="color:red;">No existe un Pokémon puente válido para esta cadena genética.</p>`;
                     return;
                }

                const obtenerGeneracion = (id) => {
                    if (id <= 151) return "Primera Generación";
                    if (id <= 251) return "Segunda Generación";
                    if (id <= 386) return "Tercera Generación";
                    if (id <= 493) return "Cuarta Generación";
                    if (id <= 649) return "Quinta Generación";
                    if (id <= 721) return "Sexta Generación";
                    if (id <= 809) return "Séptima Generación";
                    if (id <= 905) return "Octava Generación";
                    return "Novena Generación";
                };

                const nexosAgrupados = {};
                nexosFiltrados.forEach(nexo => {
                    const gen = obtenerGeneracion(nexo.id);
                    if (!nexosAgrupados[gen]) nexosAgrupados[gen] = []; 
                    const nombreCap = nexo.nombre.charAt(0).toUpperCase() + nexo.nombre.slice(1);
                    nexosAgrupados[gen].push(nombreCap);
                });

                let htmlNexos = `<p>Nexos válidos (capaces de ser macho y hembra):</p>`;
                const ordenGeneraciones = ["Primera Generación", "Segunda Generación", "Tercera Generación", "Cuarta Generación", "Quinta Generación", "Sexta Generación", "Séptima Generación", "Octava Generación", "Novena Generación"];

                ordenGeneraciones.forEach(gen => {
                    if (nexosAgrupados[gen] && nexosAgrupados[gen].length > 0) {
                        nexosAgrupados[gen].sort(); 
                        htmlNexos += `
                            <div style="text-align: left; margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                                <h4 style="margin: 0 0 10px 0; color: #333;">${gen}</h4>
                                <p style="margin: 0; color: #e3350d; font-size: 0.95em;">
                                    ${nexosAgrupados[gen].join(', ')}
                                </p>
                            </div>
                        `;
                    }
                });

                divResultado.innerHTML = htmlResultado + htmlNexos;

            } catch (error) {
                divResultado.innerHTML = `<span style="color:red;">Error: Verifica la ortografía. ${error.message}</span>`;
            }
        }
    </script>

</body>
</html>
