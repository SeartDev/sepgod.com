
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon 1.0</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        /* --- VARIABLES DE COLOR (MODO LUZ Y OSCURO) --- */
      /* --- VARIABLES DE COLOR (MODO LUZ Y OSCURO) --- */
        :root {
            --bg-body: #f8fafc;
            --bg-pattern: #cbd5e1;
            --text-main: #475569;
            --text-heading: #1e293b;
            --bg-container: rgba(255, 255, 255, 0.95);
            --border-main: #e2e8f0;
            --bg-input: #f1f5f9;
            --text-input: #334155;
            --bg-box: #ffffff;
            --bg-step: #f8fafc;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --tag-bg: #f1f5f9;
            --tag-hover: #e0f2fe;
            /* Nuevas variables para los nexos múltiples */
            --tag-multi-bg: #faf5ff;
            --tag-multi-border: #d8b4fe;
            --tag-multi-text: #6b21a8;
        }

        body.dark-mode {
            --bg-body: #0f172a; 
            --bg-pattern: #1e293b;
            --text-main: #94a3b8;
            --text-heading: #f8fafc;
            --bg-container: rgba(30, 41, 59, 0.95);
            --border-main: #334155;
            --bg-input: #1e293b;
            --text-input: #f8fafc;
            --bg-box: #0f172a;
            --bg-step: #1e293b;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --tag-bg: #334155;
            --tag-hover: #0284c7;
            /* Nuevas variables para los nexos múltiples en Oscuro */
            --tag-multi-bg: #3b0764;
            --tag-multi-border: #6b21a8;
            --tag-multi-text: #e9d5ff;
        }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 60px 20px 40px 20px; /* Padding top extra para no tapar el botón */
            box-sizing: border-box;
            transition: background-color 0.4s, color 0.4s;
        }

        /* --- ESTILO DEL BOTÓN GENGAR/PONYTA --- */
        .btn-tema {
            position: fixed; top: 20px; right: 20px;
            background: var(--bg-container); border: 1px solid var(--border-main);
            border-radius: 30px; padding: 6px 16px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; color: var(--text-heading); font-weight: 700; font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 6px var(--shadow-color); transition: all 0.3s ease; z-index: 1000;
        }
        .btn-tema img { height: 35px; width: auto; }
        .btn-tema:hover { transform: translateY(-2px); box-shadow: 0 6px 12px var(--shadow-color); }

        /* --- RESTO DE LOS ESTILOS ADAPTADOS --- */
        .contenedor {
            background-color: var(--bg-container); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; border: 1px solid var(--border-main);
            box-shadow: 0 20px 40px var(--shadow-color); text-align: center; max-width: 550px; width: 100%;
            transition: background-color 0.4s, border-color 0.4s;
        }

        h2 { margin-top: 0; color: var(--text-heading); font-weight: 700; letter-spacing: -0.5px; }

        .fila-input { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }

        .slot-foto {
            width: 60px; height: 60px; background: var(--bg-input); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-main); overflow: hidden;
            transition: background-color 0.4s, border-color 0.4s;
        }
        .slot-foto img { max-width: 90%; max-height: 90%; object-fit: contain; }

        input, select {
            padding: 12px 16px; background-color: var(--bg-input); border: 1px solid transparent;
            border-radius: 12px; font-size: 15px; color: var(--text-input); outline: none; flex-grow: 1;
            transition: background-color 0.4s, color 0.4s;
        }
        input { width: 40%; } select { width: 30%; cursor: pointer; }
        input:focus, select:focus { border-color: #ef4444; background-color: var(--bg-box);}
        select:disabled { opacity: 0.6; cursor: not-allowed; }

        button {
            width: 100%; padding: 14px 20px; background-color: #ef4444; color: white; border: none;
            border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }
        button:hover { background-color: #dc2626; transform: translateY(-2px); }

        #resultado { margin-top: 30px; font-size: 15px; line-height: 1.6; text-align: left; }
        hr { border: 0; height: 1px; background: var(--border-main); margin: 20px 0; }

        .formula-box { background: var(--bg-box); border: 1px solid var(--border-main); border-radius: 16px; padding: 20px; margin: 24px 0; transition: background-color 0.4s; }
        .formula-titulo { font-weight: 700; color: var(--text-heading); margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px; }
        
        .paso-fila {
            display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
            padding: 10px; background: var(--bg-step); border-radius: 12px; border-left: 4px solid var(--border-main);
            transition: background-color 0.4s;
        }
        .paso-1 { border-left-color: #94a3b8; } .paso-2 { border-left-color: #c084fc; } .paso-3 { border-left-color: #fbbf24; }

        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 0.9em; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .badge img { height: 25px; width: auto; object-fit: contain; margin-left: -4px; }

        .badge-macho { background: #e0f2fe; color: #0284c7; }
        .badge-hembra { background: #fce7f3; color: #db2777; }
        .badge-nexo { background: #f3e8ff; color: #9333ea; border: 1px dashed #d8b4fe; }
        .badge-meta { background: #fef3c7; color: #d97706; }
        
        .operador { color: #94a3b8; font-weight: 900; font-size: 0.9em; }
        .nota-sutil { font-size: 0.85em; color: var(--text-main); margin: 5px 0 0 10px; font-style: italic; }

        .gen-box { background: var(--bg-box); border: 1px solid var(--border-main); border-radius: 12px; padding: 16px; margin-top: 12px; transition: background-color 0.4s;}
        .gen-titulo { margin: 0 0 8px 0; color: var(--text-main); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        
        .nexo-tag {
            display: inline-block; background: var(--tag-bg); color: var(--text-input); padding: 6px 14px;
            border-radius: 8px; margin: 4px; font-size: 0.95em; font-weight: 600; cursor: pointer; border: 1px solid var(--border-main);
            transition: all 0.2s;
        }
        .nexo-tag:hover { background: var(--tag-hover); color: var(--text-heading); transform: translateY(-2px); border-color: transparent;}
        /* Agrega esto justo debajo de .nexo-tag:hover {...} */
        .nexo-tag-multi {
            background: var(--tag-multi-bg);
            border-color: var(--tag-multi-border);
            color: var(--tag-multi-text);
        }
        .nexo-tag-multi:hover {
            background: var(--tag-multi-border);
            color: #ffffff;
        }

        .btn-menu {
            background-color: var(--bg-box); color: var(--text-heading); border: 2px solid var(--border-main); padding: 20px;
            font-size: 1em; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; border-radius: 12px; width: 100%; font-family: 'Nunito', sans-serif;
            transition: all 0.3s;
        }
        .btn-ivs:hover { border-color: #3b82f6; background-color: var(--bg-step);}
        .btn-movimientos:hover { border-color: #f59e0b; background-color: var(--bg-step);}
        
        .btn-volver { width: auto; padding: 8px 16px; background-color: var(--bg-input); color: var(--text-input); margin: 0; font-size: 0.85em; box-shadow: none;}
        .btn-volver:hover { background-color: var(--border-main); color: var(--text-heading); transform: none;}

        .animar-entrada { animation: aparecerSuave 0.4s ease-out forwards; }
        @keyframes aparecerSuave { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Alertas transparentes para que luzcan bien en cualquier fondo */
        .alerta { padding: 16px; border-radius: 12px; margin-top: 16px; font-size: 0.95em; color: var(--text-heading);}
        .alerta-roja { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .alerta-naranja { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); }
        .alerta-verde { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }

        /* --- NUEVOS ESTILOS PARA LA RESOLUCIÓN DE BEBÉS --- */
.alerta-bebe { 
    background: #f0fdf4; border: 1px dashed #22c55e; color: #15803d; 
    padding: 8px 12px; border-radius: 8px; font-size: 0.85em; 
    margin-bottom: 12px; display: inline-block;
}
        
    </style>
</head>
<body>
   <body class="dark-mode">
    <button id="btnTema" class="btn-tema" onclick="alternarTema()">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/77.gif" alt="Ponyta">
        Modo Luz
    </button>

<div class="contenedor">
        
        <div id="menuSeleccion">
            <h2>🧬 Genética Pokémon</h2>
            <p style="color: #64748b; margin-bottom: 24px;">3.0 Selecciona la herramienta que necesitas hoy:</p>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="btn-menu btn-ivs" onclick="abrirHerramienta('ivs')">
                    <span style="font-size: 2em;">💯</span>
                    Heredar IVs (Estadísticas)
                </button>
                
                <button class="btn-menu btn-movimientos" onclick="abrirHerramienta('movimientos')">
                    <span style="font-size: 2em;">⚔️</span>
                    Ruta de Movimientos Huevo
                </button>

                <button class="btn-menu" style="border-color: #10b981;" onclick="abrirHerramienta('buscar_padres')" onmouseover="this.style.backgroundColor='var(--bg-step)'" onmouseout="this.style.backgroundColor='var(--bg-box)'">
                    <span style="font-size: 2em;">🔍</span>
                    Buscar Padres por Movimiento
                </button>
            </div>
        </div>

        <div id="herramientaBuscarMov" style="display: none;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenuPrincipal()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.2em;">🔍 Buscar Padres (Gen 6)</h2>
            </div>
            
            <div class="fila-input" style="align-items: flex-start;">
                <div class="slot-foto" id="fotoInputReceptor" style="margin-top: 5px;">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                
                <div style="display: flex; flex-direction: column; width: 100%; gap: 10px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="pokeInputReceptor" list="listaPokemon" placeholder="Pokémon a criar (Ej. bagon)" style="width: 60%; margin-bottom: 0;" onchange="cargarMovimientosReceptor()">
                        <select id="generoReceptor" style="width: 40%;">
                            <option value="hembra">Hembra ♀</option>
                            <option value="macho">Macho ♂</option>
                            <option value="sin_genero" hidden>Sin Género ❌</option>
                        </select>
                    </div>
                    
                    <select id="movimientoReceptorElegido" disabled style="width: 100%; font-weight: bold; color: #047857; background-color: #d1fae5; border: 1px solid #6ee7b7;">
                        <option value="">Esperando Pokémon objetivo...</option>
                    </select>
                </div>
            </div>
            
            <button onclick="buscarPadresMovimiento()" style="background-color: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);">Encontrar Padres Compatibles</button>
            <div id="resultadoBuscarMov"></div>
        </div>
    
        <div id="herramientaIVs" style="display: none;">
            
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
               <button class="btn-volver" onclick="volverMenuPrincipal()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.3em;">💯 Heredar IVs</h2>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput1">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput1" list="listaPokemon" placeholder="Donante origen (Ej. tauros)" onchange="verificarGenero('pokeInput1', 'genero1', 'fotoInput1')">
                <select id="genero1">
                    <option value="macho">Macho ♂</option>
                    <option value="hembra">Hembra ♀</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput2">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput2" list="listaPokemon" placeholder="Receptor final (Ej. chansey)" onchange="verificarGenero('pokeInput2', 'genero2', 'fotoInput2')">
                <select id="genero2">
                    <option value="hembra">Hembra ♀</option>
                    <option value="macho">Macho ♂</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <datalist id="listaPokemon"></datalist>
            <button onclick="buscarGrupoHuevo()">Calcular Ruta de Crianza</button>
            <div id="resultado"></div>
        </div>
    <div id="menuGeneraciones" style="display: none;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenuPrincipal()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.3em;">⚔️ Elige la Generación</h2>
            </div>
            
            <p style="color: #64748b; margin-bottom: 24px;">Las reglas de crianza cambian según el juego. Elige tu versión:</p>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button class="btn-menu" style="border-color: #ec4899;" onclick="abrirHerramientaMovimientos('gen6')">
                    <span style="font-size: 1.5em;">🔵🔴</span>
                    Gen 6 (X-Y / Rubí Omega - Zafiro Alfa)
                </button>
                
                <button class="btn-menu" style="opacity: 0.5; cursor: not-allowed;">
                    <span style="font-size: 1.5em;">☀️🌙</span>
                    Gen 7 (Sol-Luna) - Próximamente
                </button>
                <button class="btn-menu" style="opacity: 0.5; cursor: not-allowed;">
                    <span style="font-size: 1.5em;">⚔️🛡️</span>
                    Gen 8 (Espada-Escudo) - Próximamente
                </button>
            </div>
        </div>

        <div id="herramientaMovimientos" style="display: none;">
            
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;">
                <button class="btn-volver" onclick="volverMenuGeneraciones()">⬅ Volver</button>
                <h2 style="margin: 0; font-size: 1.2em;">⚔️ Movimientos (Gen 6)</h2>
            </div>
            
            <div class="fila-input" style="align-items: flex-start;">
                <div class="slot-foto" id="fotoInput1Mov" style="margin-top: 5px;">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                
                <div style="display: flex; flex-direction: column; width: 100%; gap: 10px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="pokeInput1Mov" list="listaPokemon" placeholder="Donante origen (Ej. charizard)" style="width: 60%; margin-bottom: 0;" onchange="cargarMovimientosGen6()">
                        <select id="genero1Mov" style="width: 40%;">
                            <option value="macho">Macho ♂</option>
                            <option value="hembra">Hembra ♀</option>
                            <option value="sin_genero" hidden>Sin Género ❌</option>
                        </select>
                    </div>
                    
                    <select id="movimientoElegido" disabled style="width: 100%; font-weight: bold; color: #0284c7; background-color: #e0f2fe; border: 1px solid #bae6fd;">
                        <option value="">Esperando Pokémon donante...</option>
                    </select>
                </div>
            </div>
            
            <div class="fila-input">
                <div class="slot-foto" id="fotoInput2Mov">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png" alt="esperando">
                </div>
                <input type="text" id="pokeInput2Mov" list="listaPokemon" placeholder="Receptor final (Ej. bagon)" onchange="verificarGenero('pokeInput2Mov', 'genero2Mov', 'fotoInput2Mov')">
                <select id="genero2Mov">
                    <option value="hembra">Hembra ♀</option>
                    <option value="macho">Macho ♂</option>
                    <option value="sin_genero" hidden>Sin Género ❌</option>
                </select>
            </div>
            
            <button onclick="calcularRutaMovimientos()">Trazar Ruta de Movimientos</button>
            <div id="resultadoMovimientos"></div>
        </div>
    </div>
    <script>
        // --- MODO OSCURO (GENGAR / PONYTA) ---
        let esModoOscuro = false;
        function alternarTema() {
            esModoOscuro = !esModoOscuro;
            document.body.classList.toggle('dark-mode', esModoOscuro);
            
            const btnTema = document.getElementById('btnTema');
            if (esModoOscuro) {
                btnTema.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/77.gif" alt="Ponyta">
                    Modo Luz
                `;
            } else {
                btnTema.innerHTML = `
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/94.gif" alt="Gengar">
                    Modo Oscuro
                `;
            }
        }

        // --- NAVEGACIÓN Y UTILIDADES ---
       // --- NAVEGACIÓN Y UTILIDADES ---
        function abrirHerramienta(tipo) {
            document.getElementById('menuSeleccion').style.display = 'none';
            if (tipo === 'ivs') {
                document.getElementById('herramientaIVs').style.display = 'block';
            } else if (tipo === 'movimientos') {
                document.getElementById('menuGeneraciones').style.display = 'block';
            } else if (tipo === 'buscar_padres') {
                document.getElementById('herramientaBuscarMov').style.display = 'block';
            }
        }

        function volverMenuPrincipal() {
            document.getElementById('herramientaIVs').style.display = 'none';
            document.getElementById('menuGeneraciones').style.display = 'none';
            document.getElementById('herramientaMovimientos').style.display = 'none';
            document.getElementById('herramientaBuscarMov').style.display = 'none';
            document.getElementById('menuSeleccion').style.display = 'block';
            document.getElementById('resultado').innerHTML = ''; 
            document.getElementById('resultadoMovimientos').innerHTML = '';
            document.getElementById('resultadoBuscarMov').innerHTML = '';
        }

        function volverMenuGeneraciones() {
            document.getElementById('herramientaMovimientos').style.display = 'none';
            document.getElementById('menuGeneraciones').style.display = 'block';
            document.getElementById('resultadoMovimientos').innerHTML = '';
        }

        function abrirHerramientaMovimientos(gen) {
            if (gen === 'gen6') {
                document.getElementById('menuGeneraciones').style.display = 'none';
                document.getElementById('herramientaMovimientos').style.display = 'block';
            }
        }

        function extraerMejorSprite(dataPokemon) {
            const gifUrl = dataPokemon.sprites?.versions?.["generation-v"]?.["black-white"]?.animated?.front_default;
            if (gifUrl) return gifUrl;
            return dataPokemon.sprites?.other?.["official-artwork"]?.front_default || '';
        }

        const cacheEspecies = {}; 
        async function getEspecieInfo(nombre) {
            if (cacheEspecies[nombre]) return cacheEspecies[nombre];
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`);
                if(!res.ok) return null;
                const data = await res.json();
                const info = { rate: data.gender_rate, id: data.id };
                cacheEspecies[nombre] = info;
                return info;
            } catch(e) { return null; }
        }

        window.onload = async function() {
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=10000');
                const data = await res.json();
                const datalist = document.getElementById('listaPokemon');
                data.results.forEach(poke => {
                    const opcion = document.createElement('option');
                    opcion.value = poke.name;
                    datalist.appendChild(opcion);
                });
            } catch (e) {}
        };

        // --- MANEJO DE INTERFAZ Y EVENTOS ---
        async function verificarGenero(inputId, selectId, fotoContId) {
            const nombre = document.getElementById(inputId).value.toLowerCase().trim();
            const selectElement = document.getElementById(selectId);
            const fotoContainer = document.getElementById(fotoContId);
            const silueta = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png";

            if (!nombre) {
                selectElement.disabled = false;
                if (selectElement.value === 'sin_genero') selectElement.value = 'macho';
                fotoContainer.innerHTML = `<img src="${silueta}" alt="esperando">`;
                return;
            }
            try {
                const [resEspecie, resPoke] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`)
                ]);

                if (!resEspecie.ok || !resPoke.ok) {
                    fotoContainer.innerHTML = `<img src="${silueta}" alt="error">`;
                    return; 
                }

                const dataEspecie = await resEspecie.json();
                const dataPoke = await resPoke.json();

                const urlFoto = extraerMejorSprite(dataPoke);
                fotoContainer.innerHTML = `<img src="${urlFoto}" alt="${nombre}" class="animar-entrada">`;

                const rate = dataEspecie.gender_rate;
                if (rate === -1) { selectElement.value = 'sin_genero'; selectElement.disabled = true; } 
                else if (rate === 0) { selectElement.value = 'macho'; selectElement.disabled = true; }

// 1. Resuelve el agujero negro de los bebés (Grupo no-eggs)
async function resolverBebe(nombrePoke) {
    let spec = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombrePoke}`).then(r => r.json());
    let grupos = spec.egg_groups.map(g => g.name);
    let esBebe = false;
    let nombreOriginal = nombrePoke;

    if (grupos.includes('no-eggs')) {
        esBebe = true;
        // Buscamos su cadena evolutiva
        const evoChain = await fetch(spec.evolution_chain.url).then(r => r.json());
        let evoActual = evoChain.chain;
        
        // Navegamos hasta encontrar al bebé actual
        while (evoActual && evoActual.species.name !== nombrePoke) {
            evoActual = evoActual.evolves_to[0];
        }
        
        // Tomamos su evolución directa
        if (evoActual && evoActual.evolves_to.length > 0) {
            const nombreEvo = evoActual.evolves_to[0].species.name;
            spec = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombreEvo}`).then(r => r.json());
            grupos = spec.egg_groups.map(g => g.name);
            nombrePoke = nombreEvo; // Actualizamos la variable para el resto del cálculo
        }
    }
    
    const pokeData = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombrePoke}`).then(r => r.json());
    return { 
        nombre: nombrePoke, 
        original: nombreOriginal,
        esBebe: esBebe, 
        spec: spec, 
        pokeData: pokeData, 
        grupos: grupos,
        foto: extraerMejorSprite(pokeData)
    };
}

// 2. Resuelve el sesgo Greedy priorizando ratios de género 50/50 (Rate 4)
// El Rate en PokeAPI va de 0 (100% M) a 8 (100% H). 4 es perfecto (50/50).
function calcularFacilidadCrianza(rate1, rate2 = 4) {
    // Si es 1 (12.5% H) o 7 (87.5% H) el puntaje será alto (peor).
    // Si es 4, el puntaje será 0 (excelente).
    const penalizacion1 = rate1 === -1 ? 10 : Math.abs(4 - rate1);
    const penalizacion2 = rate2 === -1 ? 10 : Math.abs(4 - rate2);
    return penalizacion1 + penalizacion2; 
}

        // Sub-función CORREGIDA: Radar de alternativas (Ahora verifica compatibilidad con el Donante)
        async function generarAlternativasHtml(gruposOrigen, gruposDestino, pokeDestinoOriginal, movName, pokemonsConAtaque) {
            let candidatosAlt = [];
            for (let g of gruposDestino) {
                if (!especiesPorGrupo[g]) continue;
                especiesPorGrupo[g].forEach(n => {
                    // Si SÍ sabe el ataque y NO es el destino original
                    if (n !== pokeDestinoOriginal && pokemonsConAtaque.includes(n)) {
                        // LA REGLA DE ORO: ¿Comparte grupo huevo con el Donante original?
                        const comparteConOrigen = gruposDeEspecie[n].some(gx => gruposOrigen.includes(gx));
                        if (comparteConOrigen) {
                            candidatosAlt.push(n);
                        }
                    }
                });
            }
            candidatosAlt = [...new Set(candidatosAlt)];
            if (candidatosAlt.length === 0) return "";

            const promesasAlt = candidatosAlt.map(nombre => fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`).then(r => r.json()).catch(()=>null));
            const datosAlt = await Promise.all(promesasAlt);

            let validos = [];
            datosAlt.forEach(dataPoke => {
                if (!dataPoke) return;
                let loAprende = false;
                dataPoke.moves.forEach(m => {
                    if (m.move.name === movName) {
                        const enGen6 = m.version_group_details.filter(d => 
                            (d.version_group.name === 'x-y' || d.version_group.name === 'omega-ruby-alpha-sapphire')
                        );
                        if (enGen6.length > 0) loAprende = true;
                    }
                });
                if (loAprende) {
                    validos.push({
                        nombre: dataPoke.name.charAt(0).toUpperCase() + dataPoke.name.slice(1),
                        foto: extraerMejorSprite(dataPoke)
                    });
                }
            });

            if (validos.length === 0) return "";

            validos.sort((a,b) => a.nombre.localeCompare(b.nombre));

            let html = `<div style="margin-top: 20px; background: var(--bg-step); border: 1px solid var(--border-main); border-radius: 12px; padding: 15px; text-align: left; animation: aparecerSuave 0.5s;">`;
            html += `<div style="font-weight:700; color: #d97706; margin-bottom: 15px; font-size: 1.05em;">💡 Alternativas compatibles con el Donante en el grupo [${gruposDestino.join(', ')}]:</div>`;
            html += `<div style="display:flex; flex-wrap:wrap; gap:10px; justify-content: center;">`;
            validos.forEach(v => {
                html += `<div class="badge badge-meta" style="background: var(--bg-box); border: 1px solid #fde68a; padding: 6px 12px; color: #d97706;"><img src="${v.foto}" style="height:35px; margin-right:8px;">${v.nombre}</div>`;
            });
            html += `</div></div>`;
            return html;
        }

                let candidatosBrutos = [];
                for (let g of grp1) {

                    especiesPorGrupo[g].forEach(n => {
                        if (n !== p1 && n !== p2 && n !== 'ditto' && n !== 'smeargle') {

                const promesasCandidatos = candidatosBrutos.map(nombre => Promise.all([

        async function cargarMovimientosReceptor() {
            await verificarGenero('pokeInputReceptor', 'generoReceptor', 'fotoInputReceptor');
            const nombrePoke = document.getElementById('pokeInputReceptor').value.toLowerCase().trim();
            const selectMov = document.getElementById('movimientoReceptorElegido');

            if (!nombrePoke) {
                selectMov.innerHTML = '<option value="">Esperando Pokémon objetivo...</option>';
                selectMov.disabled = true; return;
            }
            selectMov.innerHTML = '<option value="">Descargando genética (Gen 6)...</option>';
            selectMov.disabled = true;

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombrePoke}`);
                if (!res.ok) throw new Error("No encontrado");
                const data = await res.json();

                let movsNivel = []; let movsMT = []; let movsHuevo = []; let movsTutor = []; 
                data.moves.forEach(moveData => {
                    const detallesGen6 = moveData.version_group_details.filter(details => 
                        details.version_group.name === 'x-y' || details.version_group.name === 'omega-ruby-alpha-sapphire'
                    );
                    if (detallesGen6.length > 0) {
                        let nivel = 0;
                        const metodos = detallesGen6.map(d => {
                            if (d.move_learn_method.name === 'level-up' && d.level_learned_at > 0) { nivel = d.level_learned_at; }
                            return d.move_learn_method.name;
                        });
                        let nombreLimpio = moveData.move.name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        if (nivel > 0) { nombreLimpio += ` (Nv. ${nivel})`; }

                        const objMov = { val: moveData.move.name, text: nombreLimpio };
                        if (metodos.includes('level-up')) { movsNivel.push(objMov); } 
                        else if (metodos.includes('machine')) { movsMT.push(objMov); } 
                        else if (metodos.includes('egg')) { movsHuevo.push(objMov); } 
                        else { movsTutor.push(objMov); }
                    }
                });

                const ordenar = (arr) => arr.sort((a, b) => a.text.localeCompare(b.text));
                ordenar(movsNivel); ordenar(movsMT); ordenar(movsHuevo); ordenar(movsTutor);

                let opcHtml = '<option value="">-- ¿Qué movimiento deseas que herede? --</option>';
                if (movsNivel.length > 0) opcHtml += `<optgroup label="🟢 Por Nivel">${movsNivel.map(m=>`<option value="${m.val}">${m.text}</option>`).join('')}</optgroup>`;
                if (movsMT.length > 0) opcHtml += `<optgroup label="🟡 Por MT/MO">${movsMT.map(m=>`<option value="${m.val}">${m.text}</option>`).join('')}</optgroup>`;
                if (movsHuevo.length > 0) opcHtml += `<optgroup label="🟣 Movimiento Huevo">${movsHuevo.map(m=>`<option value="${m.val}">${m.text}</option>`).join('')}</optgroup>`;
                if (movsTutor.length > 0) opcHtml += `<optgroup label="🔵 Tutor/Evento">${movsTutor.map(m=>`<option value="${m.val}">${m.text}</option>`).join('')}</optgroup>`;

                selectMov.innerHTML = opcHtml; selectMov.disabled = false;
            } catch (error) { selectMov.innerHTML = '<option value="">Error.</option>'; }
        }

        // Función para mostrar cadena completa (Abuelo -> Padre -> Hijo)
        function mostrarLinajeCompleto(nAbuelo, fAbuelo, nPadre, fPadre, nHijo, fHijo, metodoPadre, gHijo) {

                pasosHtml += `
                    <div class="paso-fila paso-1" style="border-left-color: #f59e0b;">

                    </div>
                    <p class="nota-sutil" style="color:#c2410c; margin-bottom:15px;">* El padre primero debe obtener el movimiento de esta forma.</p>

            pasosHtml += `
                <div class="paso-fila paso-3" style="border-left-color: #10b981;">
                    <div class="badge badge-macho"><img src="${fPadre}">${nPadre} ♂</div>

                    <div class="badge badge-meta" style="background: #d1fae5; color: #047857;"><img src="${fHijo}">Cría ${nHijo} ${finalGenSigno} ✨</div>
                </div>`;
                
            let esquemaHtml = `
                <div class="formula-box animar-entrada">
                    <div class="formula-titulo" style="color: #047857;">📍 Linaje para el movimiento</div>
                    ${pasosHtml}
                </div>`;
            
            const cont = document.getElementById('contenedorFormulaBuscar');
            if (cont) { cont.innerHTML = esquemaHtml; cont.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        }

        async function buscarPadresMovimiento() {
            const pObj = document.getElementById('pokeInputReceptor').value.toLowerCase().trim();
            const gObj = document.getElementById('generoReceptor').value;
            const movName = document.getElementById('movimientoReceptorElegido').value;
            const selectEl = document.getElementById('movimientoReceptorElegido');
            const movText = selectEl.options[selectEl.selectedIndex] ? selectEl.options[selectEl.selectedIndex].text : '';
            const divRes = document.getElementById('resultadoBuscarMov');

            if (!pObj || !movName) { divRes.innerHTML = `<div class="alerta alerta-roja">Llena todos los campos.</div>`; return; }
            divRes.innerHTML = "<div style='text-align:center; color:#10b981; font-weight:600;'>Rastreando Origen del Movimiento...</div>";

            try {
                await cargarGruposGlobales();
                const [specObj, pokeObjData, moveDataRes] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${pObj}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${pObj}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/move/${movName}`).then(r => r.json())
                ]);

                const fotoObj = extraerMejorSprite(pokeObjData);
                const grpObj = specObj.egg_groups.map(g => g.name);
                const nObjC = pObj.charAt(0).toUpperCase() + pObj.slice(1);
                const pokemonsQueSabenAtaque = moveDataRes.learned_by_pokemon.map(p => p.name);

                let padresBrutos = [];
                for (let g of grpObj) {
                    if (especiesPorGrupo[g]) {
                        especiesPorGrupo[g].forEach(n => {
                            if (n !== 'ditto' && n !== 'smeargle' && pokemonsQueSabenAtaque.includes(n)) padresBrutos.push(n);
                        });
                    }
                }
                padresBrutos = [...new Set(padresBrutos)];

                const promesasPadres = padresBrutos.map(nombre => Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`).then(r => r.json()),
                    fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`).then(r => r.json())
                ]));
                const datosPadresPairs = await Promise.all(promesasPadres);

                // CATEGORÍAS DE PADRES
                let catNivel = []; let catOtros = [];

                for (let [dSpec, dPoke] of datosPadresPairs) {
                    if (dSpec.gender_rate === 8) continue; // No puede ser padre

                    // Analizar CÓMO aprende el padre el movimiento en Gen 6
                    let mejorMetodo = null;
                    dPoke.moves.forEach(m => {
                        if (m.move.name === movName) {
                            const det = m.version_group_details.filter(d => 
                                (d.version_group.name === 'x-y' || d.version_group.name === 'omega-ruby-alpha-sapphire')
                            );
                            if (det.length > 0) {
                                const metodos = det.map(d => d.move_learn_method.name);
                                if (metodos.includes('level-up')) mejorMetodo = 'level-up';
                                else if (metodos.includes('machine')) mejorMetodo = mejorMetodo || 'machine';
                                else if (metodos.includes('egg')) mejorMetodo = mejorMetodo || 'egg';
                                else mejorMetodo = mejorMetodo || 'tutor';
                            }
                        }
                    });

                    if (mejorMetodo) {
                        const infoPadre = { n: dSpec.name.charAt(0).toUpperCase() + dSpec.name.slice(1), f: extraerMejorSprite(dPoke), met: mejorMetodo, id: dSpec.id };
                        if (mejorMetodo === 'level-up') catNivel.push(infoPadre);
                        else catOtros.push(infoPadre);
                    }
                }

                if (catNivel.length === 0 && catOtros.length === 0) {
                     divRes.innerHTML = `<div class="alerta alerta-roja">No hay padres directos para ${movText} en Gen 6.</div>`; return;
                }

                let htmlFinal = `
                    <div style="background: var(--bg-step); border: 1px solid var(--border-main); border-radius: 12px; padding: 15px; margin-bottom: 20px;">
                        <div style="color: #047857; font-weight: 800; text-align: center; font-size: 1.1em;">🎯 Objetivo: ${nObjC} con ${movText}</div>
                    </div>
                    <div id="contenedorFormulaBuscar"></div>
                `;

                const renderSeccion = (titulo, lista, color, sub) => {
                    if (lista.length === 0) return "";
                    let h = `<div style="font-weight:700; color:${color}; margin-top:15px;">${titulo}:</div>`;
                    h += `<div class="gen-box" style="border-left: 4px solid ${color};">`;
                    lista.sort((a,b)=>a.n.localeCompare(b.n)).forEach(p => {
                        // Buscamos un "Abuelo" solo si el padre es por cadena (Egg Move)
                        // Para simplificar, si es Egg Move, buscamos CUALQUIER pokemon que lo aprenda por nivel fuera de este grupo
                        h += `<span class="nexo-tag" style="border-color:${color}aa;" onclick="prepararLinaje('${p.n}','${p.f}','${p.met}','${movName}','${nObjC}','${fotoObj}','${gObj}')">${p.n}</span> `;
                    });
                    h += `<p style="font-size:0.75em; color:var(--text-main); margin-top:8px;">${sub}</p></div>`;
                    return h;
                };

                htmlFinal += renderSeccion("🟢 Padres Naturales", catNivel, "#10b981", "Aprenden el movimiento subiendo de nivel.");
                htmlFinal += renderSeccion("🟠 Cadenas y Técnica", catOtros, "#f59e0b", "Requieren MT, Tutor o herencia previa (se mostrará la cadena).");

                divRes.innerHTML = htmlFinal;

            } catch (e) { divRes.innerHTML = `<div class="alerta alerta-roja">Error: ${e.message}</div>`; }
        }

        // Función puente para buscar al "Abuelo" (quién le enseña al padre)
        async function prepararLinaje(nPadre, fPadre, metPadre, movName, nHijo, fHijo, gHijo) {
            let nAbuelo = "Donante Externo";
            let fAbuelo = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png";

            if (metPadre !== 'level-up') {
                const moveRes = await fetch(`https://pokeapi.co/api/v2/move/${movName}`).then(r=>r.json());
                const aprendices = moveRes.learned_by_pokemon;
                
                // Buscamos al primer Pokémon de la lista que lo aprenda por nivel en Gen 6 para usarlo de ejemplo de origen
                for (let p of aprendices.slice(0, 20)) { // Limitamos búsqueda para velocidad
                    const pData = await fetch(p.url).then(r=>r.json());
                    const loSabePorNivel = pData.moves.some(m => m.move.name === movName && m.version_group_details.some(d => 
                        (d.version_group.name === 'x-y' || d.version_group.name === 'omega-ruby-alpha-sapphire') && d.move_learn_method.name === 'level-up'
                    ));
                    if (loSabePorNivel) {
                        nAbuelo = pData.name.charAt(0).toUpperCase() + pData.name.slice(1);
                        fAbuelo = extraerMejorSprite(pData);
                        break;
                    }
                }
            }
            mostrarLinajeCompleto(nAbuelo, fAbuelo, nPadre, fPadre, nHijo, fHijo, metPadre, gHijo);
        }
    </script>
