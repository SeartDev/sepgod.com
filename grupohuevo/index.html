
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon</title>
    
    <style>
        /* --- ESTILOS CSS SENCILLOS --- */
        
        /* Estilos generales para centrar el contenido y darle una fuente bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor principal que parece una tarjeta */
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para el campo de texto (input) */
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* Estilo para el botón de buscar */
        button {
            padding: 10px 20px;
            background-color: #e3350d; /* Rojo estilo Pokémon */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        /* Efecto al pasar el mouse sobre el botón */
        button:hover {
            background-color: #b32a0a;
        }

        /* Espacio donde aparecerá el resultado o los errores */
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 50px; /* Evita que la tarjeta salte mucho al mostrar texto */
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Grupos Huevo Pokémon</h2>
        
        <input type="text" id="pokeInput1" placeholder="1er Pokémon (Ej. pichu)">
        <input type="text" id="pokeInput2" placeholder="Evolución final (Ej. raichu)">
        
        <button onclick="buscarGrupoHuevo()">Buscar</button>
        
        <div id="resultado"></div>
    </div>

    <script>
       // Función principal que se ejecuta al hacer clic en el botón
        async function buscarGrupoHuevo() {
            
            const nombrePoke1 = document.getElementById('pokeInput1').value.toLowerCase().trim();
            const nombrePoke2 = document.getElementById('pokeInput2').value.toLowerCase().trim();
            const divResultado = document.getElementById('resultado');

            if (!nombrePoke1 || !nombrePoke2) {
                divResultado.innerHTML = "Por favor, escribe el nombre de ambos Pokémon.";
                return; 
            }

            divResultado.innerHTML = "Calculando todas las cadenas de crianza...";

            try {
                // 1. Obtenemos datos básicos
                const buscarDatosPoke = async (nombre) => {
                    const respuesta = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`);
                    if (!respuesta.ok) throw new Error(`No se encontró a ${nombre}`);
                    return await respuesta.json();
                };

                const [datosPoke1, datosPoke2] = await Promise.all([
                    buscarDatosPoke(nombrePoke1),
                    buscarDatosPoke(nombrePoke2)
                ]);

                const grupos1 = datosPoke1.egg_groups.map(g => g.name);
                const grupos2 = datosPoke2.egg_groups.map(g => g.name);

                const nombre1Cap = nombrePoke1.charAt(0).toUpperCase() + nombrePoke1.slice(1);
                const nombre2Cap = nombrePoke2.charAt(0).toUpperCase() + nombrePoke2.slice(1);

                let htmlResultado = `
                    <p><strong>${nombre1Cap}</strong> (Grupos: ${grupos1.join(', ')})</p>
                    <p><strong>${nombre2Cap}</strong> (Grupos: ${grupos2.join(', ')})</p>
                    <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
                `;

                if (grupos1.includes('no-eggs') || grupos2.includes('no-eggs')) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:red;">Uno de estos Pokémon no puede criar.</p>`;
                    return;
                }

                if (grupos1.some(g => grupos2.includes(g))) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:green;">¡<strong>${nombre1Cap}</strong> y <strong>${nombre2Cap}</strong> comparten grupo huevo! Pueden criar directamente.</p>`;
                    return;
                }

                divResultado.innerHTML = htmlResultado + "<em>Buscando Pokémon puente (nexo)...</em>";

                // 2. Función mejorada: Ahora guardamos el ID del Pokémon para saber su generación
                const obtenerEspeciesDeGrupos = async (grupos) => {
                    let especies = new Map(); // Usamos un "Diccionario" para guardar Nombre -> ID
                    for (let grupo of grupos) {
                        if (grupo === 'ditto') continue; 
                        const res = await fetch(`https://pokeapi.co/api/v2/egg-group/${grupo}`);
                        const data = await res.json();
                        
                        data.pokemon_species.forEach(p => {
                            // Truco: Extraemos el ID numérico directo de la URL de la API
                            const urlParts = p.url.split('/');
                            const id = parseInt(urlParts[urlParts.length - 2]);
                            especies.set(p.name, id);
                        });
                    }
                    return especies;
                };

                const [especiesLado1, especiesLado2] = await Promise.all([
                    obtenerEspeciesDeGrupos(grupos1),
                    obtenerEspeciesDeGrupos(grupos2)
                ]);

                // 3. Cruzamos los datos y guardamos el nombre y el ID
                let nexos = [];
                for (let [nombre, id] of especiesLado1.entries()) {
                    if (especiesLado2.has(nombre) && nombre !== nombrePoke1 && nombre !== nombrePoke2) {
                        nexos.push({ nombre: nombre, id: id });
                    }
                }

                if (nexos.length === 0) {
                     divResultado.innerHTML = htmlResultado + `<p style="color:red;">No existe un solo Pokémon que conecte a estas dos especies.</p>`;
                     return;
                }

                // 4. Función para saber la generación según el número de Pokédex Nacional
                const obtenerGeneracion = (id) => {
                    if (id <= 151) return "Primera Generación";
                    if (id <= 251) return "Segunda Generación";
                    if (id <= 386) return "Tercera Generación";
                    if (id <= 493) return "Cuarta Generación";
                    if (id <= 649) return "Quinta Generación";
                    if (id <= 721) return "Sexta Generación";
                    if (id <= 809) return "Séptima Generación";
                    if (id <= 905) return "Octava Generación";
                    return "Novena Generación";
                };

                // 5. Agrupamos los nexos por su generación
                const nexosAgrupados = {};
                nexos.forEach(nexo => {
                    const gen = obtenerGeneracion(nexo.id);
                    if (!nexosAgrupados[gen]) nexosAgrupados[gen] = []; // Creamos la lista si no existe
                    const nombreCap = nexo.nombre.charAt(0).toUpperCase() + nexo.nombre.slice(1);
                    nexosAgrupados[gen].push(nombreCap);
                });

                // 6. Construimos el HTML final leyendo nuestros grupos ordenados
                let htmlNexos = `<p>Puedes usar como <strong>nexo</strong> a cualquiera de estos Pokémon:</p>`;
                
                // Ordenamos las generaciones para que aparezcan de la 1 a la 9
                const ordenGeneraciones = ["Primera Generación", "Segunda Generación", "Tercera Generación", "Cuarta Generación", "Quinta Generación", "Sexta Generación", "Séptima Generación", "Octava Generación", "Novena Generación"];

                ordenGeneraciones.forEach(gen => {
                    if (nexosAgrupados[gen] && nexosAgrupados[gen].length > 0) {
                        // Ordenamos los nombres alfabéticamente dentro de cada generación
                        nexosAgrupados[gen].sort(); 
                        
                        htmlNexos += `
                            <div style="text-align: left; margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                                <h4 style="margin: 0 0 10px 0; color: #333;">${gen}</h4>
                                <p style="margin: 0; color: #e3350d; font-size: 0.95em;">
                                    ${nexosAgrupados[gen].join(', ')}
                                </p>
                            </div>
                        `;
                    }
                });

                divResultado.innerHTML = htmlResultado + htmlNexos;

            } catch (error) {
                divResultado.innerHTML = `<span style="color:red;">Error: ${error.message}. Verifica la ortografía.</span>`;
            }
        }
    </script>

</body>
</html>
