
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon</title>
    
    <style>
        /* --- ESTILOS CSS SENCILLOS --- */
        
        /* Estilos generales para centrar el contenido y darle una fuente bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor principal que parece una tarjeta */
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para el campo de texto (input) */
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* Estilo para el botón de buscar */
        button {
            padding: 10px 20px;
            background-color: #e3350d; /* Rojo estilo Pokémon */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        /* Efecto al pasar el mouse sobre el botón */
        button:hover {
            background-color: #b32a0a;
        }

        /* Espacio donde aparecerá el resultado o los errores */
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 50px; /* Evita que la tarjeta salte mucho al mostrar texto */
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Grupos Huevo Pokémon</h2>
        
        <input type="text" id="pokeInput1" placeholder="1er Pokémon (Ej. pichu)">
        <input type="text" id="pokeInput2" placeholder="Evolución final (Ej. raichu)">
        
        <button onclick="buscarGrupoHuevo()">Buscar</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        /* --- LÓGICA JAVASCRIPT --- */

        // Función principal que se ejecuta al hacer clic en el botón
        async function buscarGrupoHuevo() {
            
            // 1. Obtenemos el texto de ambos inputs
            const nombrePoke1 = document.getElementById('pokeInput1').value.toLowerCase().trim();
            const nombrePoke2 = document.getElementById('pokeInput2').value.toLowerCase().trim();
            const divResultado = document.getElementById('resultado');

            // Validamos que el usuario haya llenado ambos campos
            if (!nombrePoke1 || !nombrePoke2) {
                divResultado.innerHTML = "Por favor, escribe el nombre de ambos Pokémon.";
                return; 
            }

            divResultado.innerHTML = "Buscando...";

            try {
                // 2. Creamos una función pequeñita (helper) solo para buscar un Pokémon a la vez
                const buscarUnPokemon = async (nombre) => {
                    const respuesta = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`);
                    if (!respuesta.ok) {
                        throw new Error(`No se encontró a ${nombre}`);
                    }
                    const datos = await respuesta.json();
                    // Extraemos los grupos huevo y los unimos con coma
                    return datos.egg_groups.map(grupo => grupo.name).join(', ');
                };

                // 3. Ejecutamos la búsqueda para ambos Pokémon al mismo tiempo (es más rápido así)
                const [gruposHuevo1, gruposHuevo2] = await Promise.all([
                    buscarUnPokemon(nombrePoke1),
                    buscarUnPokemon(nombrePoke2)
                ]);

                // 4. Ponemos la primera letra en mayúscula para que se vea presentable
                const nombre1Cap = nombrePoke1.charAt(0).toUpperCase() + nombrePoke1.slice(1);
                const nombre2Cap = nombrePoke2.charAt(0).toUpperCase() + nombrePoke2.slice(1);

                // 5. Mostramos el resultado de los dos Pokémon en pantalla
                divResultado.innerHTML = `
                    <p>Grupo huevo de <strong>${nombre1Cap}</strong>:<br> <strong><span style="color:#e3350d;">${gruposHuevo1}</span></strong></p>
                    <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
                    <p>Grupo huevo de <strong>${nombre2Cap}</strong>:<br> <strong><span style="color:#e3350d;">${gruposHuevo2}</span></strong></p>
                `;

            } catch (error) {
                // Si uno de los dos nombres falla, mostramos el error
                divResultado.innerHTML = `<span style="color:red;">Error: ${error.message}. Verifica la ortografía.</span>`;
            }
        }
    </script>

</body>
</html>
