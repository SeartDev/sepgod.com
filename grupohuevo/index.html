
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Grupos Huevo Pokémon</title>
    
    <style>
        /* --- ESTILOS CSS SENCILLOS --- */
        
        /* Estilos generales para centrar el contenido y darle una fuente bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor principal que parece una tarjeta */
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Estilo para el campo de texto (input) */
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* Estilo para el botón de buscar */
        button {
            padding: 10px 20px;
            background-color: #e3350d; /* Rojo estilo Pokémon */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        /* Efecto al pasar el mouse sobre el botón */
        button:hover {
            background-color: #b32a0a;
        }

        /* Espacio donde aparecerá el resultado o los errores */
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            min-height: 50px; /* Evita que la tarjeta salte mucho al mostrar texto */
        }
    </style>
</head>
<body>

<div class="contenedor">
        <h2>Grupos Huevo Pokémon</h2>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="pokeInput1" list="listaPokemon" placeholder="1er Pokémon (Ej. pikachu)" style="width: 60%; margin-bottom: 0;">
            <select id="genero1" style="width: 40%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
                <option value="macho">Macho ♂️</option>
                <option value="hembra">Hembra ♀️</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="pokeInput2" list="listaPokemon" placeholder="Pokémon final (Ej. squirtle)" style="width: 60%; margin-bottom: 0;">
            <select id="genero2" style="width: 40%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
                <option value="hembra">Hembra ♀️</option>
                <option value="macho">Macho ♂️</option>
            </select>
        </div>
        
        <datalist id="listaPokemon"></datalist>
        
        <button onclick="buscarGrupoHuevo()">Buscar</button>
        
        <div id="resultado"></div>
    </div>
    <script>

        // --- NUEVA FUNCIÓN: Cargar la lista de autocompletado ---
        async function cargarListaNombres() {
            try {
                // Le pedimos a la API que nos traiga hasta 10,000 especies (suficiente para cubrir todos los Pokémon existentes)
                const respuesta = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=10000');
                const datos = await respuesta.json();
                const datalist = document.getElementById('listaPokemon');
                
                // Por cada Pokémon que la API nos devuelva, creamos una opción en el datalist
                datos.results.forEach(poke => {
                    const opcion = document.createElement('option');
                    opcion.value = poke.name; // La API devuelve los nombres en minúsculas (ej. bulbasaur, ivysaur)
                    datalist.appendChild(opcion);
                });
            } catch (error) {
                console.error("No se pudo cargar la lista de nombres para autocompletar.", error);
            }
        }

        // Ejecutamos esta función automáticamente en cuanto la página se abre
        window.onload = cargarListaNombres;

        // --- A PARTIR DE AQUÍ DEJA TU FUNCIÓN ACTUAL ---
        // async function buscarGrupoHuevo() { ... }
        
     async function buscarGrupoHuevo() {
            
            const nombrePoke1 = document.getElementById('pokeInput1').value.toLowerCase().trim();
            const genero1 = document.getElementById('genero1').value;
            const nombrePoke2 = document.getElementById('pokeInput2').value.toLowerCase().trim();
            const genero2 = document.getElementById('genero2').value;
            const divResultado = document.getElementById('resultado');

            if (!nombrePoke1 || !nombrePoke2) {
                divResultado.innerHTML = "Por favor, escribe el nombre de ambos Pokémon.";
                return; 
            }

            divResultado.innerHTML = "Calculando ruta de herencia de IVs...";

            try {
                const buscarDatosPoke = async (nombre) => {
                    const respuesta = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`);
                    if (!respuesta.ok) throw new Error(`No se encontró a ${nombre}`);
                    return await respuesta.json();
                };

                const [datosPoke1, datosPoke2] = await Promise.all([
                    buscarDatosPoke(nombrePoke1),
                    buscarDatosPoke(nombrePoke2)
                ]);

                const grupos1 = datosPoke1.egg_groups.map(g => g.name);
                const grupos2 = datosPoke2.egg_groups.map(g => g.name);
                const rate1 = datosPoke1.gender_rate;
                const rate2 = datosPoke2.gender_rate;
                const nombre1Cap = nombrePoke1.charAt(0).toUpperCase() + nombrePoke1.slice(1);
                const nombre2Cap = nombrePoke2.charAt(0).toUpperCase() + nombrePoke2.slice(1);

                let htmlResultado = `
                    <p><strong>${nombre1Cap}</strong> (${genero1 === 'macho' ? '♂️' : '♀️'}) - Grupos: ${grupos1.join(', ')}</p>
                    <p><strong>${nombre2Cap}</strong> (${genero2 === 'macho' ? '♂️' : '♀️'}) - Grupos: ${grupos2.join(', ')}</p>
                    <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
                `;

                // Reglas biológicas absolutas que NO se pueden saltar ni con pasos extra
                if (rate1 === -1 || rate2 === -1) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:red;"><strong>⛔ Nodos Aislados:</strong> Uno de estos Pokémon no tiene género y solo puede heredar IVs mediante un Ditto.</p>`;
                    return;
                }
                if (rate1 === 8) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:#d97706;"><strong>⛔ Bloqueo Genético:</strong> <strong>${nombre1Cap}</strong> es 100% Hembra. Como nunca puede haber un macho de su especie, es imposible pasar sus IVs a otra especie diferente.</p>`;
                    return;
                }
                if (rate2 === 0) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:#d97706;"><strong>⛔ Bloqueo Genético:</strong> <strong>${nombre2Cap}</strong> es 100% Macho. Como no existen hembras para actuar de madre receptora, no puede recibir IVs de otra especie.</p>`;
                    return;
                }

                if (grupos1.includes('no-eggs') || grupos2.includes('no-eggs')) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:red;">Uno de estos Pokémon no puede criar.</p>`;
                    return;
                }
                if (grupos1.some(g => grupos2.includes(g))) {
                    divResultado.innerHTML = htmlResultado + `<p style="color:green;">¡Comparten grupo huevo! Puedes cruzar un Macho de <strong>${nombre1Cap}</strong> con una Hembra de <strong>${nombre2Cap}</strong> directamente.</p>`;
                    return;
                }

                const obtenerEspeciesDeGrupos = async (grupos) => {
                    let especies = new Map(); 
                    for (let grupo of grupos) {
                        if (grupo === 'ditto') continue; 
                        const res = await fetch(`https://pokeapi.co/api/v2/egg-group/${grupo}`);
                        const data = await res.json();
                        data.pokemon_species.forEach(p => especies.set(p.name, p.name));
                    }
                    return especies;
                };

                const [especiesLado1, especiesLado2] = await Promise.all([
                    obtenerEspeciesDeGrupos(grupos1),
                    obtenerEspeciesDeGrupos(grupos2)
                ]);

                let nexosBasicos = [];
                for (let nombre of especiesLado1.keys()) {
                    if (especiesLado2.has(nombre) && nombre !== nombrePoke1 && nombre !== nombrePoke2) {
                        nexosBasicos.push(nombre);
                    }
                }

                const promesasNexos = nexosBasicos.map(nombre => 
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${nombre}`).then(res => res.json())
                );
                const datosNexos = await Promise.all(promesasNexos);

                let nexosFiltrados = [];
                datosNexos.forEach(data => {
                    const rate = data.gender_rate;
                    if (rate >= 1 && rate <= 7) {
                        nexosFiltrados.push({ nombre: data.name, id: data.id });
                    }
                });

                if (nexosFiltrados.length === 0) {
                     divResultado.innerHTML = htmlResultado + `<p style="color:red;">No existe un Pokémon puente válido para esta cadena genética.</p>`;
                     return;
                }

                // --- ESQUEMA DINÁMICO DE HERENCIA DE IVs ---
                let pasosHtml = "";
                let stepCounter = 1;

                // Si el poke inicial es Hembra, se añade un paso previo para sacar un Macho
                if (genero1 === 'hembra') {
                    pasosHtml += `
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; white-space: nowrap;">
                            <strong>Paso ${stepCounter++} (Preparación):</strong> 
                            <span style="background: #e2e3e5; padding: 4px 8px; border-radius: 4px;">${nombre1Cap} ♀️</span> ➕ 
                            <span style="background: #e2e3e5; padding: 4px 8px; border-radius: 4px;">Cualquier ♂️ comp.</span> 🟰 
                            <span style="background: #d1e7dd; padding: 4px 8px; border-radius: 4px;">Cría ${nombre1Cap} ♂️</span>
                        </div>
                        <p style="margin: 0 0 15px 20px; font-size: 0.85em; color: #666;"><em>* Para saltar de especie, debes heredar los IVs primero a un macho.</em></p>
                    `;
                }

                let donante = genero1 === 'hembra' ? `Cría ${nombre1Cap} ♂️` : `${nombre1Cap} ♂️`;
                
                // Paso del cruce con el Nexo
                pasosHtml += `
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; white-space: nowrap;">
                        <strong>Paso ${stepCounter++} (Puente):</strong> 
                        <span style="background: #e2e3e5; padding: 4px 8px; border-radius: 4px;">${donante}</span> ➕ 
                        <span style="background: #ffe6e6; padding: 4px 8px; border-radius: 4px; color: #e3350d; font-weight: bold;">[Nexo] ♀️</span> 🟰 
                        <span style="background: #d1e7dd; padding: 4px 8px; border-radius: 4px;">Cría [Nexo] ♂️</span>
                    </div>
                `;

                // Paso Final
                let metaEspecie = `Cría ${nombre2Cap} ${genero2 === 'macho' ? '♂️' : '♀️'}`;
                pasosHtml += `
                    <div style="display: flex; align-items: center; gap: 8px; white-space: nowrap;">
                        <strong>Paso ${stepCounter++} (Destino):</strong> 
                        <span style="background: #d1e7dd; padding: 4px 8px; border-radius: 4px;">Cría [Nexo] ♂️</span> ➕ 
                        <span style="background: #e2e3e5; padding: 4px 8px; border-radius: 4px;">Madre ${nombre2Cap} ♀️</span> 🟰 
                        <span style="background: #ffecb5; padding: 4px 8px; border-radius: 4px; font-weight: bold;">${metaEspecie} ✨</span>
                    </div>
                `;
                
                // Nota si querían un final Macho
                if (genero2 === 'macho') {
                     pasosHtml += `<p style="margin: 5px 0 0 20px; font-size: 0.85em; color: #666;"><em>* Ocupas una madre ${nombre2Cap} para fijar la especie. Solo incuba hasta que la cría salga macho.</em></p>`;
                }

                let esquemaCrianza = `
                    <div style="background-color: #f8f9fa; border-left: 5px solid #0d6efd; padding: 15px; margin: 20px 0; font-size: 0.95em; text-align: left; overflow-x: auto;">
                        <h4 style="margin: 0 0 15px 0; color: #333;">🧬 Fórmula de Crianza (Traspaso de IVs):</h4>
                        ${pasosHtml}
                        <p style="margin: 15px 0 0 0; font-size: 0.85em; color: #666;"><em>* Sustituye <strong>[Nexo]</strong> con cualquier Pokémon de la lista. <br>* Usa el <strong>Lazo Destino</strong> para asegurar los IVs.</em></p>
                    </div>
                `;

                const obtenerGeneracion = (id) => {
                    if (id <= 151) return "Primera Generación";
                    if (id <= 251) return "Segunda Generación";
                    if (id <= 386) return "Tercera Generación";
                    if (id <= 493) return "Cuarta Generación";
                    if (id <= 649) return "Quinta Generación";
                    if (id <= 721) return "Sexta Generación";
                    if (id <= 809) return "Séptima Generación";
                    if (id <= 905) return "Octava Generación";
                    return "Novena Generación";
                };

                const nexosAgrupados = {};
                nexosFiltrados.forEach(nexo => {
                    const gen = obtenerGeneracion(nexo.id);
                    if (!nexosAgrupados[gen]) nexosAgrupados[gen] = []; 
                    const nombreCap = nexo.nombre.charAt(0).toUpperCase() + nexo.nombre.slice(1);
                    nexosAgrupados[gen].push(nombreCap);
                });

                let htmlNexos = `<p>Elige tu <strong>[Nexo]</strong> de las siguientes opciones:</p>`;
                const ordenGeneraciones = ["Primera Generación", "Segunda Generación", "Tercera Generación", "Cuarta Generación", "Quinta Generación", "Sexta Generación", "Séptima Generación", "Octava Generación", "Novena Generación"];

                ordenGeneraciones.forEach(gen => {
                    if (nexosAgrupados[gen] && nexosAgrupados[gen].length > 0) {
                        nexosAgrupados[gen].sort(); 
                        htmlNexos += `
                            <div style="text-align: left; margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                                <h4 style="margin: 0 0 10px 0; color: #333;">${gen}</h4>
                                <p style="margin: 0; color: #e3350d; font-size: 0.95em;">
                                    ${nexosAgrupados[gen].join(', ')}
                                </p>
                            </div>
                        `;
                    }
                });

                divResultado.innerHTML = htmlResultado + esquemaCrianza + htmlNexos;

            } catch (error) {
                divResultado.innerHTML = `<span style="color:red;">Error: Verifica la ortografía. ${error.message}</span>`;
            }
        }
    </script>

</body>
</html>
