<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_OVERRIDE // V9.0_FINAL_LAYOUT</title>
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --bg-dark: #050505;
            --terminal-green: #00ff41;
            --admin-red: #ff0033; 
            --font-main: 'Courier New', Courier, monospace;
        }

        /* --- PANTALLA DE INTRODUCCIÓN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            background-image: url('file:///C:/Users/Seart/Desktop/Paginaweb/IMAGENES/Introduccion.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out;
        }

        #btn-entrar {
            padding: 20px 60px; font-family: var(--font-main); font-size: 2rem;
            background: rgba(0, 0, 0, 0.8); color: var(--neon-cyan);
            border: 4px solid var(--neon-cyan); cursor: pointer;
            text-transform: uppercase; letter-spacing: 12px;
            box-shadow: 0 0 25px var(--neon-cyan); transition: all 0.3s ease;
            font-weight: bold;
        }

        .glitch-active {
            animation: glitch-anim 0.25s infinite;
            filter: hue-rotate(90deg) contrast(200%);
            pointer-events: none;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); clip-path: inset(10% 0 30% 0); }
            50% { transform: translate(-5px, 5px); clip-path: inset(30% 0 10% 0); }
            100% { transform: translate(0); }
        }

        /* --- ESTILOS GENERALES --- */
        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            color: var(--neon-cyan); font-family: var(--font-main);
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- LOGIN EN ESQUINA INFERIOR IZQUIERDA --- */
        #auth-corner-panel {
            position: fixed; 
            bottom: 15px; 
            left: 15px; 
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9); 
            border: 1px solid var(--neon-cyan);
            padding: 15px; 
            width: 200px; 
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        header { text-align: center; padding: 30px; border-bottom: 1px solid var(--neon-cyan); }
        .glitch-title { text-shadow: 2px 2px var(--neon-magenta); border: 2px solid var(--neon-cyan); padding: 10px 40px; letter-spacing: 8px; display: inline-block; font-size: 1.5rem; }
        
        .main-container { display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px; padding: 20px; flex-grow: 1; }
        .module-box { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-cyan); padding: 15px; margin-bottom: 15px; }
        
        .console-input { background: transparent; border: none; color: #fff; border-bottom: 1px solid var(--terminal-green); width: 100%; margin-bottom: 10px; outline: none; font-size: 0.75rem; font-family: var(--font-main); }
        
        .category-select {
            width: 100%; background: #000; color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); padding: 5px; margin-top: 10px;
            font-family: var(--font-main); font-size: 0.7rem;
        }

        .category-btn {
            display: block; width: 100%; background: transparent; color: var(--admin-red);
            border: 2px solid var(--admin-red); padding: 20px 10px; margin-bottom: 20px;
            font-family: var(--font-main); font-size: 1.2rem; text-align: left;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
        }

        .category-btn:hover {
            background: rgba(255, 0, 51, 0.1);
            box-shadow: 0 0 15px var(--admin-red), inset 0 0 10px var(--admin-red);
            color: #fff;
        }

        /* --- POSTS --- */
        .post { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.1); 
            padding: 20px; margin-bottom: 30px; border-left: 4px solid var(--neon-cyan); 
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-admin { border: 1px solid var(--admin-red); border-left: 6px solid var(--admin-red); background: rgba(255, 0, 0, 0.05); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        
        .post-tag { font-size: 0.6rem; background: var(--admin-red); color: #fff; padding: 2px 5px; text-transform: uppercase; margin-right: 10px; }
        
        /* Título Centrado */
        .post-title { 
            color: var(--neon-cyan); 
            font-size: 1.4rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 15px 0; 
            text-align: center; 
            letter-spacing: 3px;
        }

        /* Descripción Justificada */
        .post-description { 
            color: #ccc; 
            font-size: 0.95rem; 
            white-space: pre-wrap; 
            line-height: 1.6; 
            text-align: justify;
        }

        .timestamp { font-size: 0.65rem; color: #666; }
        
        .btn { padding: 8px; cursor: pointer; border: none; text-transform: uppercase; font-weight: bold; font-size: 0.65rem; }
        .btn-delete { background: var(--admin-red); color: white; padding: 3px 8px; margin-left: 10px; }
        
        #corner-gif { position: fixed; left: 20px; top: 40%; transform: translateY(-50%); z-index: 1001; width: 80px; pointer-events: none; }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } #auth-corner-panel { position: relative; bottom: 0; left: 0; width: auto; margin: 20px; } }
    </style>
</head>
<body onload="initSystem()">

    <audio id="glitch-sound" src="https://codeskulptor-demos.commondatastorage.googleapis.com/GalaxyInvaders/pause.wav" preload="auto"></audio>

    <div id="splash-screen">
        <button id="btn-entrar" onclick="startSequence()">ENTRAR</button>
    </div>

    <img src="https://i.gifer.com/Paw.gif" id="corner-gif">

    <div id="auth-corner-panel">
        <div style="color: var(--terminal-green); font-size: 0.6rem; margin-bottom: 10px; border-bottom: 1px solid rgba(0, 255, 65, 0.3);">> AUTH_LOGIN</div>
        <input type="text" id="userInput" placeholder="USER_ID" class="console-input">
        <input type="password" id="passInput" placeholder="PASS_PHRASE" class="console-input">
        <button class="btn" style="background: var(--terminal-green); width: 100%; color: #000;" onclick="handleAuth()">LOGIN</button>
    </div>

    <header>
        <div class="glitch-title" onclick="filterByCategory('all')" style="cursor:pointer">NEURAL_OVERRIDE_V9</div>
    </header>

    <div class="main-container">
        <div class="side-panel">
            <div class="module-box">
                <div style="color: var(--neon-magenta); font-size: 0.7rem; margin-bottom: 10px;">> NODE_INFO</div>
                <div style="font-size: 0.8rem;">USER: <span id="current-user-display" style="color: var(--neon-magenta);">GUEST</span></div>
            </div>
            <div class="module-box">
                <button class="btn" style="background: var(--neon-cyan); width: 100%;" onclick="toggleAudio()" id="pBtn">CONNECT AUDIO</button>
                <audio id="player" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
            </div>
        </div>

        <div id="center-zone">
            <div id="adminPanel" style="display:none; margin-bottom: 30px;">
                <div class="module-box" style="border-color: var(--neon-magenta);">
                    <div style="color: var(--neon-cyan); font-size: 0.7rem; margin-bottom: 10px;">> NEW_BROADCAST</div>
                    <input type="text" id="postTitleInput" class="console-input" style="font-size: 1rem;" placeholder="TITULO...">
                    <textarea id="postDescInput" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid var(--neon-cyan); padding:10px; font-family:inherit; box-sizing: border-box;" placeholder="CONTENIDO..."></textarea>
                    
                    <div style="margin-top:10px;">
                        <span style="font-size:0.6rem;">TARGET_NODE:</span>
                        <select id="postCategory" class="category-select">
                            <option value="PROYECTOS">PROYECTOS</option>
                            <option value="PENSAMIENTOS">PENSAMIENTOS</option>
                            <option value="ARTES">ARTES</option>
                            <option value="SISTEMAS">SISTEMAS</option>
                        </select>
                    </div>

                    <input type="file" id="postImage" accept="image/*" style="margin-top: 10px; font-size: 0.7rem; color: var(--neon-cyan);">
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn" style="background: var(--neon-magenta); color:#fff; flex: 1;" onclick="addPost()">TRANSMITIR</button>
                        <button class="btn" style="background: #333; color:#fff;" onclick="logout()">BYE</button>
                    </div>
                </div>
            </div>
            <div id="feed"></div>
        </div>

        <div class="side-panel">
            <div class="module-box" style="border-color: var(--terminal-green);">
                <div style="color: var(--terminal-green); font-size: 0.7rem;">> SYSTEM_UPLINK</div>
                <div style="font-size: 0.6rem; color: #555; margin-top: 5px;">ESTATUS: <span id="filter-status">TODO</span></div>
            </div>

            <button class="category-btn" onclick="filterByCategory('PROYECTOS')">PROYECTOS</button>
            <button class="category-btn" onclick="filterByCategory('PENSAMIENTOS')">PENSAMIENTOS</button>
            <button class="category-btn" onclick="filterByCategory('ARTES')">ARTES</button>
            <button class="category-btn" onclick="filterByCategory('SISTEMAS')">SISTEMAS</button>
            
            <button class="btn" style="width:100%; background: #222; color: #666; margin-top: 10px;" onclick="filterByCategory('all')">RESET_FILTER</button>
        </div>
    </div>

    <script>
        let currentFilter = 'all';

        function startSequence() {
            const sound = document.getElementById('glitch-sound');
            const splash = document.getElementById('splash-screen');
            sound.play();
            splash.classList.add('glitch-active');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 600);
            }, 400);
        }

        const audio = document.getElementById('player');
        function toggleAudio() { 
            const pBtn = document.getElementById('pBtn');
            audio.paused ? (audio.play(), pBtn.innerText="DISCONNECT") : (audio.pause(), pBtn.innerText="CONNECT"); 
        }

        let loggedInUser = null;
        const ADMIN_ID = "ADMIN"; 
        const MASTER_PASS = "root123";

        function initSystem() { renderPosts(); }

        function handleAuth() {
            const user = document.getElementById('userInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            if (user === ADMIN_ID && pass === MASTER_PASS) {
                loggedInUser = user;
                document.getElementById('auth-corner-panel').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('current-user-display').innerText = user;
                renderPosts();
            } else { alert("ACCESS DENIED"); }
        }

        function logout() {
            loggedInUser = null;
            document.getElementById('auth-corner-panel').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('current-user-display').innerText = "GUEST";
            renderPosts();
        }

        async function addPost() {
            const title = document.getElementById('postTitleInput').value;
            const desc = document.getElementById('postDescInput').value;
            const cat = document.getElementById('postCategory').value;
            const fileInput = document.getElementById('postImage');
            const file = fileInput.files[0];
            let imageData = null;

            if(!title.trim() && !desc.trim() && !file) return;

            if (file) {
                imageData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const posts = JSON.parse(localStorage.getItem('cyberlogs_v9')) || [];
            posts.push({ 
                author: loggedInUser, 
                title: title,
                description: desc, 
                category: cat,
                image: imageData, 
                timestamp: Date.now(), 
                date: new Date().toLocaleString() 
            });
            
            localStorage.setItem('cyberlogs_v9', JSON.stringify(posts));
            document.getElementById('postTitleInput').value = "";
            document.getElementById('postDescInput').value = "";
            fileInput.value = ""; 
            renderPosts();
        }

        function deletePost(timestamp) {
            if(confirm("CONFIRMAR ELIMINACIÓN?")) {
                let posts = JSON.parse(localStorage.getItem('cyberlogs_v9')) || [];
                posts = posts.filter(p => p.timestamp !== timestamp);
                localStorage.setItem('cyberlogs_v9', JSON.stringify(posts));
                renderPosts();
            }
        }

        function filterByCategory(cat) {
            currentFilter = cat;
            document.getElementById('filter-status').innerText = cat === 'all' ? 'TODO' : cat;
            renderPosts();
        }

        function renderPosts() {
            const feed = document.getElementById('feed');
            let posts = JSON.parse(localStorage.getItem('cyberlogs_v9')) || [];
            if (currentFilter !== 'all') { posts = posts.filter(p => p.category === currentFilter); }
            posts.sort((a, b) => b.timestamp - a.timestamp);
            
            if (posts.length === 0) {
                feed.innerHTML = `<div style="text-align:center; color:#444; padding:20px;">[ SIN DATOS EN ${currentFilter.toUpperCase()} ]</div>`;
                return;
            }

            feed.innerHTML = posts.map((p) => {
                const isAdmin = p.author === ADMIN_ID;
                return `
                <div class="post ${isAdmin ? 'post-admin' : ''}">
                    <div class="post-header">
                        <div>
                            <span class="post-tag">${p.category || 'GENERAL'}</span>
                            <span style="font-size: 0.65rem; color: ${isAdmin ? 'var(--admin-red)' : 'var(--neon-cyan)'};">
                                [${isAdmin ? '★ ADMIN' : p.author}]
                            </span>
                        </div>
                        <div>
                            ${loggedInUser === ADMIN_ID ? `<button class="btn btn-delete" onclick="deletePost(${p.timestamp})">ERASE</button>` : ''}
                            <span class="timestamp">[${p.date}]</span>
                        </div>
                    </div>
                    ${p.title ? `<div class="post-title">${p.title}</div>` : ''}
                    ${p.image ? `<img src="${p.image}" style="max-width: 100%; border: 1px solid var(--neon-cyan); margin: 15px auto; display: block;">` : ''}
                    <div class="post-description">${p.description}</div>
                </div>`;
            }).join(''); 
        }
    </script>
</body>
</html>
