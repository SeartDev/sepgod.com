---
layout: default
---
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_OVERRIDE // V9.0_FINAL_LAYOUT</title>
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --bg-dark: #050505;
            --terminal-green: #00ff41;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            color: var(--neon-cyan); font-family: var(--font-main);
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }

        header { text-align: center; padding: 30px; border-bottom: 1px solid var(--neon-cyan); }
        .glitch-title { text-shadow: 2px 2px var(--neon-magenta); border: 2px solid var(--neon-cyan); padding: 10px 40px; letter-spacing: 8px; display: inline-block; font-size: 1.5rem; }
        
        .main-container { display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px; padding: 20px; flex-grow: 1; }
        .module-box { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--neon-cyan); padding: 15px; margin-bottom: 15px; }

        /* --- LISTA DE POSTS --- */
        .post-link-box { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.1); 
            padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--neon-cyan); 
            transition: all 0.3s ease; text-decoration: none; display: block;
        }
        .post-link-box:hover { background: rgba(0, 243, 255, 0.05); box-shadow: 0 0 15px var(--neon-cyan); transform: scale(1.02); }
        .post-title { color: var(--neon-cyan); font-size: 1.2rem; font-weight: bold; text-transform: uppercase; margin: 0; }
        .post-date { font-size: 0.7rem; color: #666; margin-top: 5px; }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="glitch-title">NEURAL_OVERRIDE_V9</div>
    </header>

    <div class="main-container">
        <div class="side-panel">
            <div class="module-box">
                <div style="color: var(--neon-magenta); font-size: 0.7rem; margin-bottom: 10px;">> NODE_INFO</div>
                <div style="font-size: 0.8rem;">USER: <span style="color: var(--neon-magenta);">ADMIN</span></div>
            </div>
        </div>

        <div id="center-zone">
            {% for post in site.posts %}
                <a href="{{ post.url }}" class="post-link-box">
                    <div class="post-title">{{ post.title }}</div>
                    <div class="post-date">FECHA_UPLINK: {{ post.date | date: "%Y-%m-%d" }}</div>
                </a>
            {% endfor %}
        </div>

        <div class="side-panel">
            <div class="module-box" style="border-color: var(--terminal-green);">
                <div style="color: var(--terminal-green); font-size: 0.7rem;">> SYSTEM_UPLINK</div>
                <div style="font-size: 0.6rem; color: #555; margin-top: 5px;">ESTATUS: ONLINE</div>
            </div>
        </div>
    </div>

</body>
</html>
