---
layout: default
---
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} // NEURAL_OVERRIDE</title>
    <style>
        /* Estilos base mantenidos del original */
        :root { --neon-cyan: #00f3ff; --neon-magenta: #ff0055; --bg-dark: #050505; --font-main: 'Courier New', monospace; }
        body { background-color: var(--bg-dark); color: var(--neon-cyan); font-family: var(--font-main); margin: 0; }
        .post-container { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid var(--neon-cyan); background: rgba(0,0,0,0.9); }
        .post-content { line-height: 1.6; text-align: justify; color: #ccc; }
        .glitch-title { text-shadow: 2px 2px var(--neon-magenta); border: 2px solid var(--neon-cyan); padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <header style="text-align:center; padding:30px;">
        <a href="/" style="text-decoration:none;"><div class="glitch-title">VOLVER_AL_NODO</div></a>
    </header>

    <main class="post-container">
        <div class="post-header">
            <span class="post-tag">{{ page.category }}</span>
            <span class="timestamp">[{{ page.date | date: "%Y-%m-%d" }}]</span>
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-content">
            {{ content }}
        </div>
    </main>
</body>
</html>
