---
layout: null
---
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} // NEURAL_OVERRIDE</title>
    <style>
        :root { 
            --neon-cyan: #00f3ff; 
            --neon-magenta: #ff0055; 
            --bg-dark: #050505; 
            --font-main: 'Courier New', monospace; 
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--neon-cyan); 
            font-family: var(--font-main); 
            margin: 0; 
            line-height: 1.6;
        }

        /* Contenedor mejorado con scroll suave */
        .post-container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            border: 1px solid var(--neon-cyan); 
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .post-header {
            border-bottom: 1px solid var(--neon-magenta);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .post-tag { color: var(--neon-magenta); font-weight: bold; }
        .timestamp { color: #666; font-size: 0.9rem; float: right; }

        .post-content { 
            text-align: justify; 
            color: #ddd; 
        }

        /* Asegura que las imágenes no rompan el layout */
        .post-content img { max-width: 100%; height: auto; border: 1px solid var(--neon-cyan); }

        .glitch-title { 
            text-shadow: 2px 2px var(--neon-magenta); 
            border: 2px solid var(--neon-cyan); 
            padding: 10px; 
            display: inline-block;
            transition: 0.3s;
        }

        .glitch-title:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        header a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>
    <header style="text-align:center; padding:30px;">
        <a href="/"><div class="glitch-title">VOLVER_AL_NODO</div></a>
    </header>

    <main class="post-container">
        <article>
            <div class="post-header">
                <span class="post-tag">[{{ page.category }}]</span>
                <span class="timestamp">DATA_REF: {{ page.date | date: "%Y-%m-%d" }}</span>
            </div>
            
            <h1 style="color: #fff; text-transform: uppercase; letter-spacing: 2px;">{{ page.title }}</h1>
            
            <div class="post-content">
                {{ content }}
            </div>
        </article>
    </main>
</body>
</html>
